<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Video Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080c14; color: #ffffff; }
        /* Player එකේ ලස්සනට පේන්න හදපු CSS */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 177.77%; /* 16:9 Aspect Ratio (TikTok style) */
            border-radius: 12px;
            overflow: hidden;
            background: #111827;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="p-4 font-sans selection:bg-pink-500 selection:text-white">

    <header class="text-center my-6">
        <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 animate-pulse">
            Fresh Video Stream
        </h1>
        <p class="text-xs text-gray-500 mt-1 uppercase tracking-widest">Direct API Embedded Player</p>
    </header>

    <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 max-w-7xl mx-auto">
        <div id="loading" class="col-span-full text-center text-gray-500 py-20 text-sm font-medium animate-pulse">
            Fetching trending videos from API... Please wait...
        </div>
    </div>

    <script>
        // අනිවාර්යයෙන්ම ඔයාගේ අලුත් Google Script ලින්ක් එක මෙතනට දාන්න!
        const MY_API_URL = "https://script.google.com/macros/s/AKfycbyP5gYRP4Ph-8y4xjnlEYyI7BQHuegYkL4p0XJRdrbI5WeUZ3GDJGBU0wpJl2IKS3aVSw/exec"; 
        
        const TAGS = ["srilanka", "trending", "dance"];

        async function fetchVideosFromMyAPI() {
            let allVideoIds = [];

            for (let tag of TAGS) {
                try {
                    const response = await fetch(`${MY_API_URL}?tag=${tag}`);
                    
                    if (response.ok) {
                        const jsonText = await response.text();
                        console.log(`Response for ${tag}:`, jsonText.substring(0, 100) + "..."); // Console එකේ බලාගන්න 
                        
                        // Regex මඟින් ID එක ඉතා නිවැරදිව අල්ලා ගැනීම
                        const regex = /"(?:video_id|id)"\s*:\s*"?(\d{15,25})"?/g;
                        let match;
                        while ((match = regex.exec(jsonText)) !== null) {
                            allVideoIds.push(match[1]);
                        }
                    }
                } catch (e) {
                    console.error(`Error fetching #${tag}:`, e);
                }
            }
            return [...new Set(allVideoIds)];
        }

        async function loadGallery() {
            const gallery = document.getElementById('gallery');
            const loading = document.getElementById('loading');

            let videoIds = await fetchVideosFromMyAPI();
            console.log("Total unique videos ready to play:", videoIds.length);

            if (!videoIds || videoIds.length === 0) {
                loading.innerHTML = "<span class='text-red-500'>No videos found. Please check if the API is returning data.</span>";
                return;
            }

            // වීඩියෝ මාරු කිරීම
            videoIds.sort(() => Math.random() - 0.5);
            loading.remove();

            // උපරිම වීඩියෝ 24ක් පෙන්වීම 
            videoIds.slice(0, 24).forEach(id => {
                const card = document.createElement('div');
                card.className = "bg-gray-900 rounded-2xl p-2 shadow-2xl border border-gray-800/60 hover:border-pink-500/50 transition duration-300";
                
                // TikTok Official iframe Player එක
                card.innerHTML = `
                    <div class="video-container">
                        <iframe 
                            src="https://www.tiktok.com/embed/v2/${id}" 
                            allowfullscreen 
                            scrolling="no"
                            allow="encrypted-media;">
                        </iframe>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        window.onload = loadGallery;
    </script>
</body>
</html>

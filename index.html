<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Premium Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080c14; color: #ffffff; }
    </style>
</head>
<body class="p-4 font-sans selection:bg-pink-500 selection:text-white">

    <header class="text-center my-6">
        <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 animate-pulse">
            Fresh Video Stream
        </h1>
        <p class="text-xs text-gray-500 mt-1 uppercase tracking-widest">100% Realtime • Direct High-Speed API</p>
    </header>

    <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 max-w-7xl mx-auto">
        <div id="loading" class="col-span-full text-center text-gray-500 py-20 text-sm font-medium animate-bounce">
            Connecting to high-speed stream and fetching content...
        </div>
    </div>

    <script>
        // ඔබට අවශ්‍ය වීඩියෝ මාතෘකා (Keywords) මෙතනට දෙන්න
        const TAGS = ["srilanka", "trending", "dance"];

        async function fetchVideosFromAPI() {
            let allVideoIds = [];

            for (let tag of TAGS) {
                try {
                    // ලෝකයේ වඩාත්ම ස්ථාවර නිදහස් TikTok API එකක් භාවිතා කිරීම
                    const url = `https://www.tikwm.com/api/posts/hashtag?keywords=${tag}`;
                    const response = await fetch(url);
                    
                    if (response.ok) {
                        const json = await response.json();
                        
                        // JSON එක ඇතුලෙන් වීඩියෝ ID ටික සුරක්ෂිතව වෙන් කර ගැනීම
                        const dataString = JSON.stringify(json);
                        const matches = dataString.match(/"video_id":"(\d+)"/g) || dataString.match(/"id":"(\d+)"/g);
                        
                        if (matches) {
                            matches.forEach(m => {
                                const id = m.match(/\d+/)[0];
                                allVideoIds.push(id);
                            });
                            console.log(`Loaded videos for #${tag}`);
                        }
                    }
                } catch (e) {
                    console.log(`Failed to fetch tag #${tag}, trying backup...`);
                }
            }

            // කිසියම් හේතුවකින් Tags වැඩ නොකලොත් Global Trending ලිස්ට් එක ඔටෝ ලෝඩ් කරන Fallback එක
            if (allVideoIds.length === 0) {
                try {
                    const trendResponse = await fetch("https://www.tikwm.com/api/feed/list");
                    if (trendResponse.ok) {
                        const json = await trendResponse.json();
                        const dataString = JSON.stringify(json);
                        const matches = dataString.match(/"video_id":"(\d+)"/g) || dataString.match(/"id":"(\d+)"/g);
                        if (matches) {
                            matches.forEach(m => {
                                const id = m.match(/\d+/)[0];
                                allVideoIds.push(id);
                            });
                        }
                    }
                } catch(err) {
                    console.error("All endpoints failed", err);
                }
            }

            // ඩූප්‍ලිකේට් අයින් කිරීම
            return [...new Set(allVideoIds)];
        }

        async function loadGallery() {
            const gallery = document.getElementById('gallery');
            const loading = document.getElementById('loading');

            let videoIds = await fetchVideosFromAPI();

            if (!videoIds || videoIds.length === 0) {
                loading.innerText = "Connection refreshing. Please reload the page in a few moments.";
                return;
            }

            // වීඩියෝ හැමවිටම මාරු කිරීම (Shuffle)
            videoIds.sort(() => Math.random() - 0.5);
            loading.remove();

            // උපරිම වීඩියෝ 24ක් පෙන්වීම (පිටුව බර වීම වැලැක්වීමට)
            videoIds.slice(0, 24).forEach(id => {
                const card = document.createElement('div');
                card.className = "bg-gray-900 rounded-2xl overflow-hidden shadow-2xl border border-gray-800/60 p-2 flex justify-center items-center hover:border-pink-500/40 transition duration-300";
                
                card.innerHTML = `
                    <iframe 
                        src="https://www.tiktok.com/embed/v2/${id}" 
                        class="w-full h-[560px] rounded-xl border-0"
                        allowfullscreen 
                        scrolling="no"
                        allow="encrypted-media;">
                    </iframe>
                `;
                gallery.appendChild(card);
            });
        }

        window.onload = loadGallery;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOT TOK - Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Pure Black Background */
            color: #ffffff;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* ෆෝන් වල address bar එක නිසා එන ප්‍රශ්න වලක්වන්න */
            height: 100dvh; 
            width: 100vw;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .snap-container {
            height: 100dvh;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .snap-section {
            height: 100dvh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        /* Loading Spinner Animation */
        .tiktok-loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ff0050; /* TikTok Pink/Red */
            border-bottom-color: #00f2fe; /* TikTok Blue */
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="hidden md:block absolute top-6 left-8 z-50 pointer-events-none">
        <h1 class="text-3xl font-black italic tracking-wider drop-shadow-md">
            <span class="text-white">HOT</span><span class="text-[#ff0050]">TOK</span>
        </h1>
    </div>

    <div id="video-feed" class="snap-container">
        
        <div id="end-loader" class="snap-section flex-col transition-opacity duration-300">
            <div class="tiktok-loader mb-4"></div>
            <p class="text-gray-400 text-sm font-medium animate-pulse">Loading more videos...</p>
        </div>

    </div>

    <script>
        // අනිවාර්යයෙන්ම ඔයාගේ Google Script Link එක මෙතනට දාන්න
        const MY_API_URL = "https://script.google.com/macros/s/AKfycbyP5gYRP4Ph-8y4xjnlEYyI7BQHuegYkL4p0XJRdrbI5WeUZ3GDJGBU0wpJl2IKS3aVSw/exec";
        
        const TAGS = ["nethmiroshel_kukku","piumi_edirisingha_hor","duneesha_piumi","srilanka_niliyo_hot","suhandi_wosadi_hot" ,"srilanka_hot_kello","srilankahotkukku",, "srilanka_kukku", "srilanka_niliyo", "praveena_disanayaka", "shaudri"];
        
        let videoPool = [];
        let seenVideoIds = new Set(); // එකම වීඩියෝ එක දෙපාරක් එන එක නවත්තන්න
        let isFetching = false;
        
        let isGlobalMuted = true;
        
        const feedContainer = document.getElementById('video-feed');
        const endLoader = document.getElementById('end-loader');

        const observerOptions = { root: feedContainer, threshold: 0.6 };
        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const videoElement = entry.target.querySelector('video');
                if (!videoElement) return;

                if (entry.isIntersecting) {
                    videoElement.muted = isGlobalMuted;
                    videoElement.play().catch(e => console.log("Autoplay paused by browser."));
                } else {
                    videoElement.pause();
                    videoElement.currentTime = 0; 
                }
            });
        }, observerOptions);

        // Background එකෙන් වීඩියෝ ගෙනැවිත් Pool එකට දාලා කවලම් කිරීම (Shuffle)
        async function fetchVideosInBackground(isInitialLoad = false) {
            if (isFetching) return;
            isFetching = true;

            const randomTag = TAGS[Math.floor(Math.random() * TAGS.length)];
            const cacheBuster = Math.floor(Math.random() * 10000);

            try {
                const response = await fetch(`${MY_API_URL}?tag=${randomTag}&cb=${cacheBuster}`);
                if (response.ok) {
                    const json = await response.json();
                    let rawVideos = [];

                    if (json.data && Array.isArray(json.data)) rawVideos = json.data;
                    else if (json.data && Array.isArray(json.data.videos)) rawVideos = json.data.videos;

                    let newVideos = [];
                    rawVideos.forEach(v => {
                        const id = v.id || v.video_id;
                        const playUrl = v.play || v.wmplay;
                        
                        // ID එක කලින් ඇවිත් නැත්තන් විතරක් ගන්නවා
                        if (playUrl && id && !seenVideoIds.has(id)) {
                            seenVideoIds.add(id);
                            newVideos.push({
                                id: id,
                                playUrl: playUrl,
                                cover: v.cover || v.origin_cover,
                                title: v.title || "Trending on HOT TOK",
                                author: v.author ? v.author.nickname : "TikToker"
                            });
                        }
                    });

                    if (newVideos.length > 0) {
                        videoPool.push(...newVideos);
                        // Pool එකට අලුත් ඒවා දැම්මට පස්සේ මුළු Pool එකම පට්ට විදිහට කවලම් කරනවා
                        videoPool.sort(() => Math.random() - 0.5);
                    }
                }
            } catch (e) {
                console.error("Failed to fetch videos:", e);
            }

            isFetching = false;

            // පළවෙනි පාර නම් ක්ෂණිකව Render කරනවා
            if (isInitialLoad && videoPool.length > 0) {
                renderBatchFromPool();
            } else if (videoPool.length > 0 && isWaitingForVideo) {
                // Internet අවුල් වෙලා ඉඳලා අලුත් වීඩියෝ ආවොත්, Loader එක අයින් කරලා Render කරනවා
                isWaitingForVideo = false;
                renderBatchFromPool();
            }
        }

        let isWaitingForVideo = false;

        function renderBatchFromPool() {
            if (videoPool.length === 0) return;
            
            // එකවරකට වීඩියෝ 4ක් තිරයට දානවා
            const batch = videoPool.splice(0, 4);
            const hintOpacity = isGlobalMuted ? 'opacity-100' : 'opacity-0 pointer-events-none';

            batch.forEach(videoData => {
                const section = document.createElement('div');
                section.className = "snap-section";
                
                // Mobile: w-full h-full (No borders, Edge to edge)
                // PC (md): w-[400px] h-[92%] rounded-xl border
                section.innerHTML = `
                    <div class="relative w-full h-[100dvh] md:w-[420px] md:h-[94vh] md:rounded-[16px] bg-black overflow-hidden flex justify-center items-center md:border md:border-gray-800 shadow-2xl">
                        
                        <video 
                            class="w-full h-full object-cover cursor-pointer"
                            loop 
                            playsinline 
                            ${isGlobalMuted ? 'muted' : ''} 
                            preload="metadata"
                            poster="${videoData.cover}">
                            <source src="${videoData.playUrl}" type="video/mp4">
                        </video>

                        <div class="absolute bottom-5 left-4 right-4 text-left z-20 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] pointer-events-none">
                            <h3 class="text-white font-bold text-[17px] mb-1">@${videoData.author}</h3>
                            <p class="text-gray-200 text-[14px] font-normal leading-snug line-clamp-2">${videoData.title}</p>
                        </div>

                        <div class="unmute-hint absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black/60 text-white px-5 py-3 rounded-full pointer-events-none text-sm transition-opacity duration-300 backdrop-blur-sm font-semibold tracking-wide z-30 ${hintOpacity}">
                            Tap to Unmute
                        </div>
                    </div>
                `;

                const videoElement = section.querySelector('video');
                
                // Mute / Unmute Logic
                videoElement.addEventListener('click', () => {
                    isGlobalMuted = !isGlobalMuted;
                    document.querySelectorAll('video').forEach(vid => vid.muted = isGlobalMuted);
                    document.querySelectorAll('.unmute-hint').forEach(hint => {
                        hint.classList.remove('opacity-100');
                        hint.classList.add('opacity-0', 'pointer-events-none');
                    });
                });

                // අපි අලුත් වීඩියෝ එක Add කරන්නේ අර End Loader එකට *කලින්* (එතකොට Loader එක හැමදාම අන්තිමටම තියෙනවා)
                feedContainer.insertBefore(section, endLoader);
                videoObserver.observe(section); 
            });
        }

        // Scroll එක පල්ලෙහාට යද්දි
        feedContainer.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = feedContainer;
            
            // වීඩියෝ 2ක් විතර ඉතුරු වෙලා තියෙද්දි ඊළඟ ටික දානවා (Seamless Load)
            if (scrollTop + clientHeight >= scrollHeight - (clientHeight * 2)) {
                
                if (videoPool.length > 0) {
                    renderBatchFromPool();
                } else if (!isFetching) {
                    // Pool එක හිස් නම්, අලුත් ඒවා එනකන් Wait කරනවා (Loader එක පේන්න ගන්නවා)
                    isWaitingForVideo = true;
                    fetchVideosInBackground();
                }
            }
        });

        // Background Updater - හැම තත්පර 5කට සැරයක්ම බලනවා Pool එකේ වීඩියෝ 10ට වඩා අඩුවෙන්ද තියෙන්නේ කියලා. 
        // අඩුවෙන් නම් තව අලුත් Tag එකක් හොයන් ඇවිත් කවලම් කරලා Pool එක පුරවනවා. (කිසිම Lag එකක් වෙන්නේ නෑ මේකෙන්).
        setInterval(() => {
            if (videoPool.length < 10 && !isFetching) {
                fetchVideosInBackground();
            }
        }, 5000);

        // මුලින්ම සයිට් එක Load වෙද්දි ක්ෂණිකව එක Tag එකක් ගේනවා
        window.onload = () => {
            fetchVideosInBackground(true);
        };

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOT TOK - Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100dvh; 
            width: 100vw;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .snap-container {
            height: 100dvh;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .snap-section {
            height: 100dvh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            flex-shrink: 0;
        }

        video::-webkit-media-controls { display: none !important; opacity: 0 !important; }
        video::-webkit-media-controls-start-playback-button { display: none !important; opacity: 0 !important; -webkit-appearance: none; }

        /* නවීන නියෝන් ලෝඩර් මෝස්තරය */
        .modern-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            border-top-color: #ff0050;
            border-right-color: #00f2fe;
            animation: spin 0.8s infinite linear;
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.2);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .play-btn-overlay {
            transition: opacity 0.25s ease-in-out, transform 0.25s ease-in-out;
        }
        
        .modern-btn {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }
        .modern-btn:hover {
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        
        .search-input {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            border-color: #ff0050;
            box-shadow: 0 0 10px rgba(255, 0, 80, 0.3);
            background: rgba(10, 10, 10, 0.95);
        }
    </style>
</head>
<body>

    <div class="hidden md:block absolute top-8 left-10 z-50 pointer-events-none">
        <h1 class="text-3xl font-black italic tracking-wider drop-shadow-md">
            <span class="text-white">HOT</span><span class="text-[#ff0050]">TOK</span>
        </h1>
    </div>

    <div class="hidden md:block absolute top-24 left-10 z-50 w-64 bg-[#111111] bg-opacity-75 backdrop-blur-md p-4 rounded-xl border border-gray-800 shadow-2xl">
        <div class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Search Hashtags</div>
        <div class="flex gap-2 mb-3">
            <input type="text" id="desktop-search-input" placeholder="e.g. funny, sl, dance" class="search-input w-full rounded-lg px-3 py-1.5 text-sm focus:outline-none">
            <button onclick="handleSearch('desktop')" class="bg-[#ff0050] hover:bg-[#d00043] text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors outline-none">Go</button>
        </div>
        <div id="desktop-active-tags" class="flex flex-wrap gap-1.5 mb-2 max-h-24 overflow-y-auto"></div>
        <button onclick="resetSearch()" id="desktop-reset-btn" class="w-full bg-gray-900 hover:bg-gray-800 border border-gray-700 text-gray-400 text-[11px] py-1.5 rounded-md transition-colors font-medium hidden">Reset to Sheet Tags</button>
    </div>

    <div class="block md:hidden absolute top-6 left-5 z-50">
        <button onclick="toggleMobileSearch(true)" class="modern-btn p-2.5 rounded-full outline-none shadow-lg active:scale-90">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 011-14 0"></path></svg>
        </button>
    </div>

    <div id="mobile-search-overlay" class="fixed inset-x-0 top-0 z-50 bg-black bg-opacity-95 backdrop-blur-lg flex flex-col justify-start p-6 border-b border-gray-800 transition-all duration-300 transform -translate-y-full hidden">
        <div class="flex justify-between items-center mb-5">
            <h2 class="text-lg font-bold text-white tracking-wide">Filter Feed by Tag</h2>
            <button onclick="toggleMobileSearch(false)" class="text-gray-400 hover:text-white p-1 outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="flex gap-2 mb-4">
            <input type="text" id="mobile-search-input" placeholder="Enter hashtag here..." class="search-input w-full rounded-xl px-4 py-2.5 text-sm focus:outline-none">
            <button onclick="handleSearch('mobile')" class="bg-[#ff0050] text-white px-5 py-2.5 rounded-xl font-medium text-sm outline-none">Search</button>
        </div>
        <div id="mobile-tag-label" class="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2 hidden">Active Filters:</div>
        <div id="mobile-active-tags" class="flex flex-wrap gap-1.5 mb-4"></div>
        <button onclick="resetSearch(); toggleMobileSearch(false);" id="mobile-reset-btn" class="w-full bg-gray-950 text-gray-400 py-2.5 rounded-xl border border-gray-800 font-medium text-xs hidden">Reset to Default Feed</button>
    </div>

    <div class="hidden md:flex absolute right-12 top-1/2 transform -translate-y-1/2 flex-col gap-5 z-40">
        <button onclick="scrollFeed(-1)" class="modern-btn p-4 rounded-full group outline-none" title="Previous Video">
            <svg class="w-6 h-6 text-white group-hover:-translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"></path>
            </svg>
        </button>
        <button onclick="scrollFeed(1)" class="modern-btn p-4 rounded-full group outline-none" title="Next Video">
            <svg class="w-6 h-6 text-white group-hover:translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
            </svg>
        </button>
    </div>

    <video id="global-player" class="w-full h-full object-cover cursor-pointer absolute inset-0 z-10" loop playsinline webkit-playsinline preload="auto" style="display: none;"></video>

    <div id="video-feed" class="snap-container relative z-10">
        
        <div id="first-placeholder" class="snap-section video-item p-0 md:p-4">
            <div class="relative w-full h-[100dvh] md:w-[420px] md:h-[94vh] md:rounded-[20px] bg-[#050505] overflow-hidden flex justify-center items-center md:border md:border-gray-800 shadow-2xl">
                <div class="modern-spinner"></div>
                <div class="absolute bottom-6 left-4 right-16 text-left z-20 opacity-20">
                    <div class="w-32 h-4 bg-gray-700 rounded mb-3"></div>
                    <div class="w-48 h-3 bg-gray-700 rounded"></div>
                </div>
            </div>
        </div>

        <div id="bottom-loader" class="snap-section hidden">
            <div class="relative w-full h-[100dvh] md:w-[420px] md:h-[94vh] md:rounded-[20px] bg-[#050505] overflow-hidden flex justify-center items-center md:border md:border-gray-800 shadow-2xl">
                <div class="modern-spinner"></div>
            </div>
        </div>

    </div>

    <script>
        const MY_API_URL = "https://script.google.com/macros/s/AKfycbwkQ155dnHs-NXzPobU6jSG046PuJPQUduqxSRyhXvAjC1mo5X-Ey1JYs9nzmYvf1A7rA/exec"; 
        
        let TAGS = []; 
        let originalSheetTags = []; 
        let customTags = []; 
        let currentTagIndex = 0;
        let loadedVideosData = []; 
        let currentActiveIndex = 0; 
        let isFetching = false;
        let isGlobalMuted = true; 
        let wasManuallyPaused = false; 
        
        let seenVideoIds = [];
        try {
            seenVideoIds = JSON.parse(localStorage.getItem('hotTokSeenVideos')) || [];
            seenVideoIds = seenVideoIds.map(id => id.toString());
        } catch(e) {
            seenVideoIds = [];
        }

        const feedContainer = document.getElementById('video-feed');
        const bottomLoader = document.getElementById('bottom-loader');
        const globalPlayer = document.getElementById('global-player');

        const iconMuted = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd" /><path stroke-linecap="round" stroke-linejoin="round" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" /></svg>`;
        const iconUnmuted = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>`;

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function markVideoAsSeen(id) {
            if (!id) return;
            const idStr = id.toString();
            if (!seenVideoIds.includes(idStr)) {
                seenVideoIds.push(idStr);
                if (seenVideoIds.length > 3000) { seenVideoIds.shift(); } 
                localStorage.setItem('hotTokSeenVideos', JSON.stringify(seenVideoIds));
            }
        }

        function scrollFeed(direction) {
            const height = feedContainer.clientHeight;
            feedContainer.scrollBy({ top: direction * height, behavior: 'smooth' });
        }

        // ආරක්ෂිත යතුරුපුවරු පාලනය (ටයිප් කරන විට ස්ක්‍රෝල් වීම වළක්වයි)
        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return; 
            
            if (e.key === 'ArrowUp') { e.preventDefault(); scrollFeed(-1); } 
            else if (e.key === 'ArrowDown') { e.preventDefault(); scrollFeed(1); } 
            else if (e.key.toLowerCase() === 'm') { toggleGlobalMute(); }
        });

        function toggleGlobalMute() {
            isGlobalMuted = !isGlobalMuted;
            globalPlayer.muted = isGlobalMuted;
            document.querySelectorAll('.mute-btn').forEach(btn => {
                btn.innerHTML = isGlobalMuted ? iconMuted : iconUnmuted;
            });
        }

        // Play/Pause දෘශ්‍ය සංඥා පාලනය (Status Icons Overlay Logic)
        globalPlayer.addEventListener('click', () => {
            const currentCard = document.querySelector(`.video-wrapper[data-index="${currentActiveIndex}"]`);
            if (!currentCard) return;
            const playBtnOverlay = currentCard.querySelector('.play-btn-overlay');
            
            if (globalPlayer.paused) {
                wasManuallyPaused = false;
                globalPlayer.play().then(() => {
                    if (playBtnOverlay) {
                        // Play ලකුණ මොහොතකට පෙන්වා මැකී යයි
                        playBtnOverlay.innerHTML = `<svg fill="#fff" viewBox="0 0 24 24" width="36" height="36" style="margin-left: 4px;"><path d="M8 5v14l11-7z"/></svg>`;
                        playBtnOverlay.style.opacity = '1';
                        playBtnOverlay.style.transform = 'translate(-50%, -50%) scale(1.1)';
                        setTimeout(() => {
                            if (!globalPlayer.paused) {
                                playBtnOverlay.style.opacity = '0';
                                playBtnOverlay.style.transform = 'translate(-50%, -50%) scale(1)';
                            }
                        }, 400);
                    }
                }).catch(e => console.log(e));
            } else {
                wasManuallyPaused = true;
                globalPlayer.pause();
                if (playBtnOverlay) {
                    // Pause ලකුණ ස්ථාවරව රඳවා ගනී
                    playBtnOverlay.innerHTML = `<svg fill="#fff" viewBox="0 0 24 24" width="36" height="36"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
                    playBtnOverlay.style.opacity = '1';
                    playBtnOverlay.style.transform = 'translate(-50%, -50%) scale(1)';
                }
            }
        });

        // Page Visibility API (Tab එක මාරු කරද්දී වීඩියෝව ස්වයංක්‍රීයව පෝස්/රෙසියුම් වීම)
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                globalPlayer.pause();
            } else {
                if (!wasManuallyPaused) {
                    globalPlayer.play().catch(e => console.log(e));
                    const currentCard = document.querySelector(`.video-wrapper[data-index="${currentActiveIndex}"]`);
                    if (currentCard) {
                        const playBtnOverlay = currentCard.querySelector('.play-btn-overlay');
                        if (playBtnOverlay && !globalPlayer.paused) playBtnOverlay.style.opacity = '0';
                    }
                }
            }
        });

        function renderVideoCardStructure(container, videoData) {
            container.innerHTML = `
                <div class="relative w-full h-[100dvh] md:w-[420px] md:h-[94vh] md:rounded-[20px] bg-[#050505] overflow-hidden flex justify-center items-center md:border md:border-gray-800 shadow-[0_0_40px_rgba(0,0,0,0.5)]">
                    
                    <div class="video-slot absolute inset-0 z-10 bg-cover bg-center" style="background-image: url('${videoData.cover}');"></div>
                    
                    <button class="mute-btn absolute top-6 right-5 p-2.5 z-40 outline-none bg-transparent border-none text-white drop-shadow-[0_2px_5px_rgba(0,0,0,0.9)] transition-transform active:scale-95">
                        ${isGlobalMuted ? iconMuted : iconUnmuted}
                    </button>
                    
                    <div class="play-btn-overlay absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none opacity-0" style="width: 65px; height: 65px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; z-30; backdrop-filter: blur(4px);">
                    </div>
                    
                    <div class="absolute bottom-6 left-5 right-16 text-left z-20 drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] pointer-events-none">
                        <h3 class="text-white font-bold text-[16px] mb-1 tracking-wide">@${videoData.author}</h3>
                        <p class="text-gray-200 text-[13.5px] font-normal leading-snug line-clamp-2">${videoData.title}</p>
                    </div>
                </div>
            `;

            const muteBtn = container.querySelector('.mute-btn');
            muteBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                toggleGlobalMute();
            });
        }

        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const container = entry.target;
                const index = parseInt(container.dataset.index);
                
                if (entry.isIntersecting) {
                    currentActiveIndex = index;
                    wasManuallyPaused = false; 
                    const videoData = loadedVideosData[currentActiveIndex];
                    
                    markVideoAsSeen(videoData.id);
                    
                    const slot = container.querySelector('.video-slot');
                    if (slot) {
                        if (globalPlayer.parentElement !== slot) {
                            slot.appendChild(globalPlayer);
                            globalPlayer.src = videoData.playUrl;
                            globalPlayer.load();
                        }
                        
                        globalPlayer.style.display = 'block';
                        globalPlayer.muted = isGlobalMuted; 
                        
                        const playBtnOverlay = container.querySelector('.play-btn-overlay');
                        if (playBtnOverlay) playBtnOverlay.style.opacity = '0';

                        setTimeout(() => {
                            if (currentActiveIndex === index) { 
                                globalPlayer.play().then(() => {
                                    if (playBtnOverlay) playBtnOverlay.style.opacity = '0';
                                }).catch(error => {
                                    if (playBtnOverlay) {
                                        playBtnOverlay.innerHTML = `<svg fill="#fff" viewBox="0 0 24 24" width="36" height="36" style="margin-left: 4px;"><path d="M8 5v14l11-7z"/></svg>`;
                                        playBtnOverlay.style.opacity = '1';
                                    }
                                });
                            }
                        }, 50);
                    }
                }
            });
        }, { threshold: 0.5 }); 

        // Hashtag Filter Logic (සෙවුම් පද්ධතියේ ක්‍රියාකාරීත්වය)
        function handleSearch(mode) {
            const inputId = mode === 'desktop' ? 'desktop-search-input' : 'mobile-search-input';
            const rawInput = document.getElementById(inputId).value.trim().toLowerCase();
            
            if (!rawInput) return;
            
            // කොමා (,) මගින් වෙන් කර හැෂ්ටැග් කිහිපයක් වුවද සෙවිය හැක
            const parsedTags = rawInput.split(',').map(t => t.trim().replace('#', '')).filter(t => t.length > 0);
            if (parsedTags.length === 0) return;
            
            customTags = parsedTags;
            document.getElementById(inputId).value = '';
            
            updateSearchUI();
            reloadFeedWithFilters();
            
            if (mode === 'mobile') {
                toggleMobileSearch(false);
            }
        }

        function resetSearch() {
            customTags = [];
            updateSearchUI();
            reloadFeedWithFilters();
        }

        function updateSearchUI() {
            const desktopActive = document.getElementById('desktop-active-tags');
            const mobileActive = document.getElementById('mobile-active-tags');
            const desktopReset = document.getElementById('desktop-reset-btn');
            const mobileReset = document.getElementById('mobile-reset-btn');
            const mobileLabel = document.getElementById('mobile-tag-label');
            
            let html = '';
            customTags.forEach(tag => {
                html += `<span class="bg-gray-900 text-xs px-2.5 py-1 rounded-md border border-gray-800 text-[#00f2fe] font-medium">#${tag}</span>`;
            });
            
            desktopActive.innerHTML = html;
            mobileActive.innerHTML = html;
            
            if (customTags.length > 0) {
                desktopReset.classList.remove('hidden');
                mobileReset.classList.remove('hidden');
                mobileLabel.classList.remove('hidden');
            } else {
                desktopReset.classList.add('hidden');
                mobileReset.classList.add('hidden');
                mobileLabel.classList.add('hidden');
            }
        }

        function toggleMobileSearch(show) {
            const overlay = document.getElementById('mobile-search-overlay');
            if (show) {
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('-translate-y-full'), 10);
                document.getElementById('mobile-search-input').focus();
            } else {
                overlay.classList.add('-translate-y-full');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        async function reloadFeedWithFilters() {
            globalPlayer.pause();
            globalPlayer.style.display = 'none';
            
            // පරණ වීඩියෝ කාඩ්පත් ඔක්කොම ඉවත් කරයි
            document.querySelectorAll('.video-wrapper').forEach(w => {
                videoObserver.unobserve(w);
                w.remove();
            });
            
            // මුල් ලෝඩර් ප්ලේස්හෝල්ඩරය නැවත ප්‍රතිෂ්ඨාපනය කරයි
            let firstPlaceholder = document.getElementById('first-placeholder');
            if (!firstPlaceholder) {
                firstPlaceholder = document.createElement('div');
                firstPlaceholder.id = 'first-placeholder';
                firstPlaceholder.className = "snap-section video-item p-0 md:p-4";
                firstPlaceholder.innerHTML = `
                    <div class="relative w-full h-[100dvh] md:w-[420px] md:h-[94vh] md:rounded-[20px] bg-[#050505] overflow-hidden flex justify-center items-center md:border md:border-gray-800 shadow-2xl">
                        <div class="modern-spinner"></div>
                    </div>
                `;
                feedContainer.insertBefore(firstPlaceholder, bottomLoader);
            }
            
            loadedVideosData = [];
            currentActiveIndex = 0;
            currentTagIndex = 0;
            
            // සෙවුම් ටැග් තිබේ නම් ඒවාද, නැතහොත් Sheet ටැග් ද ලබා ගනී (සෆල් එක ආරක්ෂිතයි)
            if (customTags.length > 0) {
                TAGS = shuffleArray(customTags);
            } else {
                TAGS = shuffleArray(originalSheetTags);
            }
            
            feedContainer.scrollTop = 0;
            
            await fetchNextVideo();
            await fetchNextVideo();
        }

        async function fetchTagsFromSheet() {
            try {
                const response = await fetch(`${MY_API_URL}?action=get_tags`);
                const json = await response.json();
                if (json.tags && Array.isArray(json.tags) && json.tags.length > 0) {
                    originalSheetTags = json.tags;
                    TAGS = shuffleArray(originalSheetTags); 
                } else {
                    originalSheetTags = ["srilanka"];
                    TAGS = ["srilanka"]; 
                }
            } catch (e) {
                originalSheetTags = ["srilanka"];
                TAGS = ["srilanka"];
            }
            currentTagIndex = 0;
        }

        async function fetchNextVideo() {
            if (isFetching || TAGS.length === 0) return;
            isFetching = true;

            let attempts = 0;
            let found = false;

            while (attempts < 6 && !found) {
                const currentTag = TAGS[currentTagIndex];
                
                currentTagIndex = (currentTagIndex + 1) % TAGS.length;
                if (currentTagIndex === 0) TAGS = shuffleArray(TAGS); 
                
                try {
                    const response = await fetch(`${MY_API_URL}?action=get_videos&tag=${currentTag}`);
                    const json = await response.json();
                    let rawVideos = [];

                    if (json && json.data) {
                        if (Array.isArray(json.data)) rawVideos = json.data;
                        else if (Array.isArray(json.data.videos)) rawVideos = json.data.videos;
                    }

                    let validVideos = rawVideos.filter(v => {
                        const id = (v.id || v.video_id || "").toString();
                        const play = v.play || v.wmplay;
                        return id && play && !seenVideoIds.includes(id);
                    }).map(v => ({
                        id: (v.id || v.video_id).toString(),
                        playUrl: v.play || v.wmplay,
                        cover: v.cover || v.origin_cover || "",
                        title: v.title || "",
                        author: v.author ? (v.author.nickname || "User") : "User"
                    }));

                    if (validVideos.length > 0) {
                        const videoData = validVideos[0]; 
                        loadedVideosData.push(videoData);
                        
                        injectNewContainer(loadedVideosData.length - 1);
                        found = true;
                    }
                } catch (e) {
                    console.error("Fetch error");
                }
                attempts++;
            }
            
            isFetching = false;
        }

        function injectNewContainer(index) {
            const container = document.createElement('div');
            container.className = "snap-section video-wrapper p-0 md:p-4"; 
            container.dataset.index = index;
            
            renderVideoCardStructure(container, loadedVideosData[index]);
            
            const firstPlaceholder = document.getElementById('first-placeholder');
            if (firstPlaceholder) {
                firstPlaceholder.replaceWith(container);
                bottomLoader.classList.remove('hidden');
                bottomLoader.style.display = 'flex';
            } else {
                feedContainer.insertBefore(container, bottomLoader);
            }
            
            videoObserver.observe(container);
            
            // පරිශීලකයා පල්ලෙහා බලාගෙන සිටී නම් (Loader එක මත ඇත්නම්), අලුත් වීඩියෝවට සුමටව ස්ක්‍රෝල් කරවයි
            const rect = bottomLoader.getBoundingClientRect();
            const isLoaderOnScreen = (rect.top >= 0 && rect.top < window.innerHeight);
            if (isLoaderOnScreen && index > 0) {
                container.scrollIntoView({ behavior: 'smooth' });
            }
        }

        feedContainer.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = feedContainer;
            if (scrollTop + clientHeight >= scrollHeight - clientHeight * 1.5) {
                if(!isFetching) fetchNextVideo();
            }
        });

        function unlockAutoplay() {
            globalPlayer.play().catch(e => console.log(e));
            document.removeEventListener('touchstart', unlockAutoplay);
            document.removeEventListener('click', unlockAutoplay);
        }
        document.addEventListener('touchstart', unlockAutoplay, { passive: true });
        document.addEventListener('click', unlockAutoplay, { passive: true });

        async function startStream() {
            try {
                await fetchTagsFromSheet(); 
                
                await fetchNextVideo(); 
                if (loadedVideosData.length === 0) {
                    seenVideoIds = [];
                    localStorage.removeItem('hotTokSeenVideos');
                    await fetchNextVideo();
                }
                
                await fetchNextVideo(); 
                await fetchNextVideo();
                
            } catch (error) {
                setTimeout(startStream, 2000);
            }
        }

        window.onload = startStream;
    </script>
</body>
</html>

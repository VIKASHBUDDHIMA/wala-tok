<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Video Trimmer & Cropper</title>
    
    <script>
        const OldWorker = window.Worker;
        window.Worker = function (sub, opt) {
            let url = sub.toString();
            if (url.startsWith('http') && !url.includes(window.location.origin)) {
                const blob = new Blob([`importScripts("${url}");`], { type: 'application/javascript' });
                return new OldWorker(URL.createObjectURL(blob), opt);
            }
            return new OldWorker(sub, opt);
        };
        window.Worker.prototype = OldWorker.prototype;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 12px; max-width: 500px; width: 100%; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #00d2ff; margin-top: 0; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 6px; border: none; background: #2a2a2a; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #00d2ff; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #00a8cc; }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }
        
        .video-wrapper { position: relative; width: 100%; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 15px; display: none; }
        video { width: 100%; display: block; }
        .crop-overlay { position: absolute; top: 0; bottom: 0; left: 0; right: 0; border: 2px dashed #00d2ff; pointer-events: none; box-shadow: 0 0 0 9999px rgba(0,0,0,0.6); transition: 0.1s; }

        .range-container { position: relative; height: 40px; margin: 20px 0; display: none; }
        .range-track { position: absolute; width: 100%; height: 8px; background: #333; top: 50%; transform: translateY(-50%); border-radius: 4px; }
        .range-fill { position: absolute; height: 8px; background: #00d2ff; top: 50%; transform: translateY(-50%); border-radius: 4px; }
        input[type="range"].dual { position: absolute; width: 100%; top: 50%; transform: translateY(-50%); appearance: none; background: transparent; pointer-events: none; margin: 0; }
        input[type="range"].dual::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: #fff; border: 2px solid #00d2ff; border-radius: 50%; pointer-events: auto; cursor: ew-resize; }
        
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; display: none; margin-bottom: 15px; }
        .crop-control label { font-size: 12px; color: #aaa; }
        .crop-control input { width: 100%; }

        #log { margin-top: 15px; font-size: 13px; color: #00d2ff; text-align: center; white-space: pre-line; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎬 PRO EDITOR</h2>
    
    <input type="text" id="videoUrl" placeholder="TikTok ලින්ක් එක මෙතන දාන්න...">
    <button id="loadBtn">Load Video</button>

    <div class="video-wrapper" id="videoWrapper">
        <video id="previewVideo" controls playsinline></video>
        <div class="crop-overlay" id="cropOverlay"></div>
    </div>

    <div class="range-container" id="trimControls">
        <div class="range-track"></div>
        <div class="range-fill" id="trimFill"></div>
        <input type="range" class="dual" id="startTrim" min="0" max="100" value="0" step="0.1">
        <input type="range" class="dual" id="endTrim" min="0" max="100" value="100" step="0.1">
    </div>
    <div id="timeDisplay" style="text-align: center; font-size: 12px; margin-bottom: 15px; display: none;">Trim: 0.0s - 0.0s</div>

    <div class="controls-grid" id="cropControls">
        <div class="crop-control"><label>Crop Top (%)</label><input type="range" id="cTop" min="0" max="40" value="0"></div>
        <div class="crop-control"><label>Crop Bottom (%)</label><input type="range" id="cBot" min="0" max="40" value="0"></div>
        <div class="crop-control"><label>Crop Left (%)</label><input type="range" id="cLeft" min="0" max="40" value="0"></div>
        <div class="crop-control"><label>Crop Right (%)</label><input type="range" id="cRight" min="0" max="40" value="0"></div>
    </div>

    <button id="processBtn" style="display: none; background: #ff0055; color: white;">Trim, Crop & Upload to Telegram</button>
    <div id="log"></div>
</div>

<script>
    // ⚠️ ඔබේ Telegram Bot Token සහ Channel ID මෙතැනට දාන්න
    const BOT_TOKEN = "8974378669:AAG8rV50s_UhiJau-Vqgq22z6JYkYf_GwKQ"; 
    const CHAT_ID = "-1003754232314";     

    const { FFmpeg } = FFmpegWASM;
    const { fetchFile, toBlobURL } = FFmpegUtil;
    const ffmpeg = new FFmpeg();

    const video = document.getElementById('previewVideo');
    const startSlider = document.getElementById('startTrim');
    const endSlider = document.getElementById('endTrim');
    const trimFill = document.getElementById('trimFill');
    const cropOverlay = document.getElementById('cropOverlay');
    
    let videoBlobData = null; 
    let videoDuration = 0;

    function logMessage(msg) { document.getElementById('log').innerHTML = msg; }

    document.getElementById('loadBtn').addEventListener('click', async () => {
        const url = document.getElementById('videoUrl').value;
        if (!url) return alert("ලින්ක් එකක් දෙන්න!");
        
        const loadBtn = document.getElementById('loadBtn');
        loadBtn.disabled = true;
        logMessage("⏳ TikTok API එකෙන් වීඩියෝව සොයමින් පවතී...");

        try {
            const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            
            if(data.code !== 0 || !data.data.play) throw new Error("TikTok වීඩියෝව සොයාගත නොහැක.");
            const directVideoUrl = data.data.play;

            logMessage("⏳ වීඩියෝව බ්‍රවුසරයට බාගත කරමින් පවතී...");
            const videoFetch = await fetch(directVideoUrl);
            videoBlobData = await videoFetch.blob();
            
            video.src = URL.createObjectURL(videoBlobData);
            document.getElementById('videoWrapper').style.display = 'block';
            
            video.onloadedmetadata = () => {
                videoDuration = video.duration;
                startSlider.max = videoDuration;
                endSlider.max = videoDuration;
                endSlider.value = videoDuration;
                
                document.getElementById('trimControls').style.display = 'block';
                document.getElementById('timeDisplay').style.display = 'block';
                document.getElementById('cropControls').style.display = 'grid';
                document.getElementById('processBtn').style.display = 'block';
                updateSliders();
                logMessage("✅ වීඩියෝව සූදානම්! දැන් Trim සහ Crop කරන්න.");
            };
        } catch (e) {
            logMessage("❌ දෝෂයක්: " + e.message);
        } finally {
            loadBtn.disabled = false;
        }
    });

    function updateSliders() {
        let startVal = parseFloat(startSlider.value);
        let endVal = parseFloat(endSlider.value);
        if (startVal >= endVal) { startSlider.value = endVal - 0.5; startVal = endVal - 0.5; }
        
        trimFill.style.left = (startVal / videoDuration) * 100 + "%";
        trimFill.style.width = ((endVal - startVal) / videoDuration) * 100 + "%";
        document.getElementById('timeDisplay').innerText = `Trim: ${startVal.toFixed(1)}s - ${endVal.toFixed(1)}s`;
        video.currentTime = startVal;
    }
    startSlider.addEventListener('input', updateSliders);
    endSlider.addEventListener('input', updateSliders);

    function updateCropBox() {
        cropOverlay.style.top = document.getElementById('cTop').value + "%";
        cropOverlay.style.bottom = document.getElementById('cBot').value + "%";
        cropOverlay.style.left = document.getElementById('cLeft').value + "%";
        cropOverlay.style.right = document.getElementById('cRight').value + "%";
    }
    ['cTop', 'cBot', 'cLeft', 'cRight'].forEach(id => document.getElementById(id).addEventListener('input', updateCropBox));

    document.getElementById('processBtn').addEventListener('click', async () => {
        if(!videoBlobData) return alert("වීඩියෝ දත්ත හමුනොවුනි!");
        
        if (BOT_TOKEN === "ඔබේ_BOT_TOKEN_එක_මෙතන_දාන්න") {
            return alert("කරුණාකර කේතය තුළට ඔබගේ BOT TOKEN සහ CHAT ID ඇතුලත් කරන්න!");
        }

        const btn = document.getElementById('processBtn');
        btn.disabled = true;
        
        const startT = parseFloat(startSlider.value);
        const durationT = parseFloat(endSlider.value) - startT;

        const natW = video.videoWidth; const natH = video.videoHeight;
        const cropX = Math.floor((document.getElementById('cLeft').value / 100) * natW);
        const cropY = Math.floor((document.getElementById('cTop').value / 100) * natH);
        const cropW = Math.floor(natW - cropX - ((document.getElementById('cRight').value / 100) * natW));
        const cropH = Math.floor(natH - cropY - ((document.getElementById('cBot').value / 100) * natH));

        try {
            logMessage("⚙️ FFmpeg පද්ධතිය සූදානම් කරමින්...");
            
            if (!ffmpeg.loaded) {
                const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd';
                await ffmpeg.load({
                    coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                    wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
                    workerURL: await toBlobURL(`${baseURL}/ffmpeg-core.worker.js`, 'text/javascript')
                });
            }

            logMessage("✂️ වීඩියෝව Edit කරමින් පවතී (Trim & Crop)... මඳක් රැඳී සිටින්න.");
            await ffmpeg.writeFile('input.mp4', await fetchFile(videoBlobData));
            
            await ffmpeg.exec([
                '-ss', startT.toString(),
                '-i', 'input.mp4',
                '-t', durationT.toString(),
                '-vf', `crop=${cropW}:${cropH}:${cropX}:${cropY}`,
                '-c:v', 'libx264',
                '-preset', 'ultrafast',
                '-c:a', 'copy',
                'output.mp4'
            ]);

            logMessage("📤 සාර්ථකයි! දැන් Telegram චැනලය වෙත Upload වෙමින් පවතී...");
            const fileData = await ffmpeg.readFile('output.mp4');
            const outputBlob = new Blob([fileData.buffer], { type: 'video/mp4' });

            const formData = new FormData();
            formData.append("chat_id", CHAT_ID);
            formData.append("video", outputBlob, "edited_video.mp4");
            
            const tgUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`;
            const uploadRes = await fetch(tgUrl, { method: "POST", body: formData });
            const uploadData = await uploadRes.json();

            if (uploadData.ok) {
                logMessage("✅ සාර්ථකයි! වීඩියෝව Telegram චැනලයට යවන ලදි.");
            } else {
                throw new Error("Telegram දෝෂයකි: " + uploadData.description);
            }

        } catch (e) {
            console.error(e);
            logMessage("❌ දෝෂයක්: " + e.message);
        } finally {
            btn.disabled = false;
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Premium Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080c14; color: #ffffff; }
    </style>
</head>
<body class="p-4 font-sans selection:bg-pink-500 selection:text-white">

    <header class="text-center my-6">
        <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 animate-pulse">
            Fresh Video Stream
        </h1>
        <p class="text-xs text-gray-500 mt-1 uppercase tracking-widest">Powered by Custom Private API</p>
    </header>

    <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 max-w-7xl mx-auto">
        <div id="loading" class="col-span-full text-center text-gray-500 py-20 text-sm font-medium animate-bounce">
            Connecting to your private API and fetching content...
        </div>
    </div>

    <script>
        // ඔයාගේ Google Script එකෙන් ආපු දිග ලින්ක් එක පහතින් ඇතුලත් කරන්න
        const MY_API_URL = "https://script.google.com/macros/s/AKfycbyP5gYRP4Ph-8y4xjnlEYyI7BQHuegYkL4p0XJRdrbI5WeUZ3GDJGBU0wpJl2IKS3aVSw/exec"; 
        
        // ඔබට අවශ්‍ය Tags
        const TAGS = ["srilanka", "trending", "dance"];

        async function fetchVideosFromMyAPI() {
            let allVideoIds = [];

            for (let tag of TAGS) {
                try {
                    const response = await fetch(`${MY_API_URL}?tag=${tag}`);
                    
                    if (response.ok) {
                        const text = await response.text();
                        
                        // ක්‍රමය 1: JSON එකක් විදිහට හරියටම Parse කර ID වෙන් කර ගැනීම
                        try {
                            const json = JSON.parse(text);
                            let videos = [];
                            if (json.data) {
                                if (Array.isArray(json.data)) videos = json.data;
                                else if (Array.isArray(json.data.videos)) videos = json.data.videos;
                            }
                            
                            videos.forEach(v => {
                                if (v.video_id) allVideoIds.push(String(v.video_id));
                                else if (v.id) allVideoIds.push(String(v.id));
                            });
                        } catch (jsonErr) {
                            console.log("Standard JSON parsing skipped, using robust fallback...");
                        }

                        // ක්‍රමය 2 (Fallback): Quotes තිබ්බත් නැතත් ID එක අහුකර ගන්නා සුපිරි Regex එකක්
                        const flexibleRegex = /"(?:video_id|id)"\s*:\s*"*(\d+)"*/g;
                        let match;
                        while ((match = flexibleRegex.exec(text)) !== null) {
                            allVideoIds.push(match[1]);
                        }
                    }
                } catch (e) {
                    console.log(`Error fetching #${tag}:`, e);
                }
            }

            // ඩූප්‍ලිකේට් ID අයින් කිරීම
            return [...new Set(allVideoIds)];
        }

        async function loadGallery() {
            const gallery = document.getElementById('gallery');
            const loading = document.getElementById('loading');

            let videoIds = await fetchVideosFromMyAPI();

            console.log("Total unique videos found:", videoIds.length);

            if (!videoIds || videoIds.length === 0) {
                loading.innerText = "No videos found. TikWM might be reloading. Try refreshing in a few moments.";
                return;
            }

            // වීඩියෝ මාරු කිරීම (Shuffle)
            videoIds.sort(() => Math.random() - 0.5);
            loading.remove();

            // උපරිම වීඩියෝ 32ක් පෙන්වීම
            videoIds.slice(0, 32).forEach(id => {
                const card = document.createElement('div');
                card.className = "bg-gray-900 rounded-2xl overflow-hidden shadow-2xl border border-gray-800/60 p-2 flex justify-center items-center hover:border-pink-500/40 transition duration-300";
                
                card.innerHTML = `
                    <iframe 
                        src="https://www.tiktok.com/embed/v2/${id}" 
                        class="w-full h-[560px] rounded-xl border-0"
                        allowfullscreen 
                        scrolling="no"
                        allow="encrypted-media;">
                    </iframe>
                `;
                gallery.appendChild(card);
            });
        }

        window.onload = loadGallery;
    </script>
</body>
</html>

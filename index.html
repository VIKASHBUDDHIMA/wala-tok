<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Trimmer & Telegram Uploader</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #0088cc; color: white; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #aaa; }
        #log { margin-top: 15px; font-size: 0.9em; color: #333; background: #eee; padding: 10px; border-radius: 4px; display: none; }
    </style>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
</head>
<body>

<div class="container">
    <h2>🔗 Video Processor</h2>
    
    <label>Social Media Video Link (Tiktok/IG/FB):</label>
    <input type="text" id="videoUrl" placeholder="Paste link here...">
    
    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Start Time (සෙකන්ඩ්):</label>
            <input type="number" id="startTime" value="0" min="0">
        </div>
        <div style="flex: 1;">
            <label>End Time (සෙකන්ඩ්):</label>
            <input type="number" id="endTime" value="10" min="1">
        </div>
    </div>

    <button id="processBtn">Trim & Upload to Telegram</button>
    <div id="log"></div>
</div>

<script>
    const { FFmpeg } = FFmpegWASM;
    const { fetchFile } = FFmpegUtil;
    const ffmpeg = new FFmpeg();
    
    const WORKER_URL = "https://videofootele.rathuuweb.workers.dev"; // උදා: https://bot.yourname.workers.dev

    function logMessage(msg) {
        const logDiv = document.getElementById('log');
        logDiv.style.display = 'block';
        logDiv.innerHTML += `> ${msg}<br>`;
    }

    async function processAndUpload() {
        const btn = document.getElementById('processBtn');
        const url = document.getElementById('videoUrl').value;
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;
        const duration = end - start;

        if (!url) return alert("කරුණාකර ලින්ක් එකක් ඇතුළත් කරන්න!");

        try {
            btn.disabled = true;
            document.getElementById('log').innerHTML = '';
            
            // 1. Get Direct Video Link via Cobalt API
            logMessage("වීඩියෝව සෙවීම ආරම්භ කළා...");
            const apiRes = await fetch("https://api.cobalt.tools/api/json", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify({ url: url, videoQuality: "720" })
            });
            const apiData = await apiRes.json();
            if (apiData.status === "error" || !apiData.url) throw new Error("වීඩියෝව බාගත කිරීමට නොහැකි විය.");
            const directVideoUrl = apiData.url;

            // 2. Load FFmpeg
            logMessage("FFmpeg පද්ධතිය සූදානම් කරමින්...");
            if (!ffmpeg.loaded) await ffmpeg.load();

            // 3. Download & Trim Video in Browser
            logMessage(`වීඩියෝව Trim කරමින්... (තත්පර ${start} සිට ${end} දක්වා)`);
            await ffmpeg.writeFile('input.mp4', await fetchFile(directVideoUrl));
            await ffmpeg.exec(['-i', 'input.mp4', '-ss', start.toString(), '-t', duration.toString(), '-c', 'copy', 'output.mp4']);
            const fileData = await ffmpeg.readFile('output.mp4');
            const videoBlob = new Blob([fileData.buffer], { type: 'video/mp4' });

            // 4. Send to Cloudflare Worker
            logMessage("Telegram වෙත යවමින්...");
            const formData = new FormData();
            formData.append("video", videoBlob, "video.mp4");

            const uploadRes = await fetch(WORKER_URL, {
                method: "POST",
                body: formData
            });

            if (uploadRes.ok) {
                logMessage("✅ සාර්ථකව Telegram වෙත යවන ලදි!");
            } else {
                throw new Error("Worker එක හරහා යැවීම අසාර්ථකයි.");
            }

        } catch (error) {
            console.error(error);
            logMessage("❌ දෝෂයක්: " + error.message);
        } finally {
            btn.disabled = false;
        }
    }

    document.getElementById('processBtn').addEventListener('click', processAndUpload);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOT TOK - Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100dvh; 
            width: 100vw;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .snap-container {
            height: 100dvh;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .snap-section {
            height: 100dvh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        /* Loading Bar (Bottom) */
        .bottom-loader-section {
            height: 12vh;
            width: 100%;
            scroll-snap-align: end; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            flex-shrink: 0;
        }

        .tiktok-loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ff0050; 
            border-bottom-color: #00f2fe; 
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Play Button Pop Animation */
        .play-btn-overlay {
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
        }
        .pop-animation {
            transform: translate(-50%, -50%) scale(1.3) !important;
            opacity: 0 !important;
        }
    </style>
</head>
<body>

    <div class="hidden md:block absolute top-6 right-8 z-50 pointer-events-none">
        <h1 class="text-3xl font-black italic tracking-wider drop-shadow-md">
            <span class="text-white">HOT</span><span class="text-[#ff0050]">TOK</span>
        </h1>
    </div>

    <div id="video-feed" class="snap-container">
        
        <div id="initial-loader" class="h-[100dvh] w-full flex flex-col justify-center items-center bg-black z-50 absolute top-0 left-0">
            <div class="tiktok-loader mb-4" style="width:40px; height:40px;"></div>
            <p class="text-gray-400 text-sm font-medium animate-pulse" id="loading-text">Connecting...</p>
        </div>

        <div id="bottom-loader" class="bottom-loader-section hidden flex-col">
            <div class="tiktok-loader mb-2"></div>
            <p class="text-gray-500 text-xs font-medium">Loading next video...</p>
        </div>

    </div>

    <script>
        // මෙතන අනිවාර්යයෙන්ම ඔයාගේ Apps Script (Web App) URL එක දාන්න!
        const MY_API_URL = "https://script.google.com/macros/s/AKfycbwkQ155dnHs-NXzPobU6jSG046PuJPQUduqxSRyhXvAjC1mo5X-Ey1JYs9nzmYvf1A7rA/exec"; 
        
        let TAGS = []; 
        let videoPool = []; 
        
        let seenVideoIds = [];
        try {
            seenVideoIds = JSON.parse(localStorage.getItem('hotTokSeenVideos')) || [];
        } catch(e) {
            seenVideoIds = [];
        }

        let isFetching = false;
        let isGlobalMuted = true;
        let currentVisibleVideo = null; 
        
        const feedContainer = document.getElementById('video-feed');
        const initialLoader = document.getElementById('initial-loader');
        const bottomLoader = document.getElementById('bottom-loader');
        const loadingText = document.getElementById('loading-text');

        function markVideoAsSeen(id) {
            if (!seenVideoIds.includes(id)) {
                seenVideoIds.push(id);
                if (seenVideoIds.length > 500) {
                    seenVideoIds.shift(); 
                }
                localStorage.setItem('hotTokSeenVideos', JSON.stringify(seenVideoIds));
            }
        }

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                if (currentVisibleVideo && !currentVisibleVideo.paused) {
                    currentVisibleVideo.pause();
                    currentVisibleVideo.dataset.wasPlaying = "true";
                }
            } else {
                if (currentVisibleVideo && currentVisibleVideo.dataset.wasPlaying === "true") {
                    currentVisibleVideo.play().catch(e => console.log(e));
                    currentVisibleVideo.dataset.wasPlaying = "false";
                }
            }
        });

        const observerOptions = { root: feedContainer, threshold: 0.6 };
        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const videoElement = entry.target.querySelector('video');
                const playBtnOverlay = entry.target.querySelector('.play-btn-overlay');
                if (!videoElement) return;

                if (entry.isIntersecting) {
                    currentVisibleVideo = videoElement;
                    videoElement.muted = isGlobalMuted;
                    
                    const playPromise = videoElement.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            if(playBtnOverlay) {
                                playBtnOverlay.style.opacity = '0';
                                playBtnOverlay.style.transform = 'translate(-50%, -50%) scale(1)';
                            }
                        }).catch(error => {
                            console.log("Autoplay waiting for user interaction");
                            if(playBtnOverlay) playBtnOverlay.style.opacity = '1';
                        });
                    }
                } else {
                    videoElement.pause();
                    videoElement.currentTime = 0; 
                }
            });
        }, observerOptions);

        async function fetchTagsFromSheet() {
            try {
                const response = await fetch(`${MY_API_URL}?action=get_tags`);
                const json = await response.json();
                if (json.tags && Array.isArray(json.tags) && json.tags.length > 0) {
                    TAGS = json.tags;
                } else {
                    TAGS = ["srilanka", "sinhala", "trending"]; 
                }
            } catch (e) {
                TAGS = ["srilanka", "sinhala", "trending"];
            }
        }

        async function fetchVideosToPool() {
            if (isFetching || TAGS.length === 0) return false;
            isFetching = true;

            let attempts = 0;
            let found = false;

            while (attempts < 3 && !found) {
                const randomTag = TAGS[Math.floor(Math.random() * TAGS.length)];
                
                try {
                    const response = await fetch(`${MY_API_URL}?action=get_videos&tag=${randomTag}`);
                    if (!response.ok) throw new Error("Network issue");
                    
                    const json = await response.json();
                    let rawVideos = [];

                    if (json.data && Array.isArray(json.data)) rawVideos = json.data;
                    else if (json.data && Array.isArray(json.data.videos)) rawVideos = json.data.videos;

                    let validVideos = rawVideos.filter(v => {
                        const id = v.id || v.video_id;
                        const play = v.play || v.wmplay;
                        return id && play && !seenVideoIds.includes(id);
                    }).map(v => ({
                        id: v.id || v.video_id,
                        playUrl: v.play || v.wmplay,
                        cover: v.cover || v.origin_cover || "",
                        title: v.title || "",
                        author: v.author ? (v.author.nickname || "TikToker") : "TikToker"
                    }));

                    if (validVideos.length > 0) {
                        videoPool.push(...validVideos);
                        videoPool.sort(() => Math.random() - 0.5); 
                        found = true;
                    }
                } catch (e) {
                    console.error("Fetch failed for tag:", randomTag, e);
                }
                attempts++;
            }
            
            isFetching = false;
            return found;
        }

        async function fetchAndRenderOneVideo() {
            if (videoPool.length === 0) {
                const success = await fetchVideosToPool();
                if (!success) return false; // වීඩියෝ ගේන්න බැරි උනොත් False දෙනවා
            }
            
            if (videoPool.length > 0) {
                const videoData = videoPool.shift(); 
                markVideoAsSeen(videoData.id);
                renderVideoToDOM(videoData);
            }

            if (videoPool.length < 3 && !isFetching) {
                fetchVideosToPool();
            }
            
            return true;
        }

        function renderVideoToDOM(videoData) {
            if (initialLoader && initialLoader.style.display !== 'none') {
                initialLoader.style.display = 'none';
                bottomLoader.style.display = 'flex'; 
                bottomLoader.classList.remove('hidden');
            }

            const section = document.createElement('div');
            section.className = "snap-section video-item";
            
            const muteIcon = isGlobalMuted ? `
                <svg fill="#fff" viewBox="0 0 24 24" width="28" height="28"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            ` : `
                <svg fill="#fff" viewBox="0 0 24 24" width="28" height="28"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            `;

            section.innerHTML = `
                <div class="relative w-full h-[100dvh] md:w-[420px] md:h-[94vh] md:rounded-[16px] bg-black overflow-hidden flex justify-center items-center md:border md:border-gray-800 shadow-2xl">
                    
                    <button class="mute-btn absolute top-6 left-4 bg-black/60 p-3 rounded-full z-40 transition-transform hover:scale-110 active:scale-95">
                        ${muteIcon}
                    </button>

                    <video 
                        class="w-full h-full object-cover cursor-pointer"
                        loop 
                        playsinline 
                        preload="auto"
                        ${isGlobalMuted ? 'muted' : ''} 
                        poster="${videoData.cover}">
                        <source src="${videoData.playUrl}" type="video/mp4">
                    </video>

                    <div class="play-btn-overlay absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none opacity-0" style="width: 70px; height: 70px; background: rgba(0,0,0,0.4); border-radius: 50%; display: flex; justify-content: center; align-items: center; z-30;">
                        <svg fill="#fff" viewBox="0 0 24 24" width="40" height="40" style="margin-left: 4px;"><path d="M8 5v14l11-7z"/></svg>
                    </div>

                    <div class="absolute bottom-5 left-4 right-16 text-left z-20 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] pointer-events-none">
                        <h3 class="text-white font-bold text-[17px] mb-1">@${videoData.author}</h3>
                        <p class="text-gray-200 text-[14px] font-normal leading-snug line-clamp-2">${videoData.title}</p>
                    </div>
                </div>
            `;

            const videoElement = section.querySelector('video');
            const playBtnOverlay = section.querySelector('.play-btn-overlay');
            const muteBtn = section.querySelector('.mute-btn');
            
            videoElement.addEventListener('click', () => {
                if (videoElement.paused) {
                    const playPromise = videoElement.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            playBtnOverlay.style.opacity = '1';
                            playBtnOverlay.classList.add('pop-animation');
                            setTimeout(() => {
                                playBtnOverlay.classList.remove('pop-animation');
                                playBtnOverlay.style.opacity = '0';
                            }, 200);
                        }).catch(e => console.log(e));
                    }
                } else {
                    videoElement.pause();
                    playBtnOverlay.classList.remove('pop-animation');
                    playBtnOverlay.style.opacity = '1';
                    playBtnOverlay.style.transform = 'translate(-50%, -50%) scale(1)';
                }
            });

            muteBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                isGlobalMuted = !isGlobalMuted; 
                
                const newIcon = isGlobalMuted ? `
                    <svg fill="#fff" viewBox="0 0 24 24" width="28" height="28"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                ` : `
                    <svg fill="#fff" viewBox="0 0 24 24" width="28" height="28"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                `;

                document.querySelectorAll('video').forEach(vid => vid.muted = isGlobalMuted);
                document.querySelectorAll('.mute-btn').forEach(btn => btn.innerHTML = newIcon);
            });

            feedContainer.insertBefore(section, bottomLoader);
            videoObserver.observe(section); 
        }

        feedContainer.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = feedContainer;
            if (scrollTop + clientHeight >= scrollHeight - clientHeight * 1.2) {
                fetchAndRenderOneVideo();
            }
        });

        async function startStream() {
            // URL එක දාලද කියලා Check කරනවා
            if (MY_API_URL === "YOUR_APPS_SCRIPT_URL_HERE" || MY_API_URL.trim() === "") {
                loadingText.innerText = "Error: කරුණාකර Apps Script ලින්ක් එක MY_API_URL එකට දාන්න!";
                loadingText.style.color = "#ff0050";
                document.querySelector('.tiktok-loader').style.display = 'none';
                return;
            }

            loadingText.innerText = "Loading Config...";
            await fetchTagsFromSheet(); 
            
            loadingText.innerText = "Starting stream...";
            
            let rendered = await fetchAndRenderOneVideo(); 
            
            // වීඩියෝ එක ආවේ නැත්නම් History එක මකලා ආයෙ Try කරනවා
            if (!rendered) {
                loadingText.innerText = "Retrying... (Clearing old cache)";
                seenVideoIds = [];
                localStorage.removeItem('hotTokSeenVideos');
                
                rendered = await fetchAndRenderOneVideo();
                
                // ආයෙත් ආවේ නැත්නම් Error එකක් පෙන්නනවා
                if(!rendered) {
                    loadingText.innerText = "Error: වීඩියෝ ලෝඩ් කරගන්න බැරි වුණා. Script URL එක හරිද බලන්න.";
                    loadingText.style.color = "#ff0050";
                    document.querySelector('.tiktok-loader').style.display = 'none';
                    return;
                }
            }
            
            fetchAndRenderOneVideo();
            fetchAndRenderOneVideo();
        }

        window.onload = startStream;

    </script>
</body>
</html>

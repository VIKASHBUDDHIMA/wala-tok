<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium TikTok Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #050505; /* Deep black */
            color: #ffffff;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Hide scrollbar */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .snap-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .snap-section {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Loading Spinner */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ec4899;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="video-feed" class="snap-container">
        <div id="initial-loader" class="h-screen flex flex-col justify-center items-center text-gray-400 z-50">
            <div class="loader mb-4"></div>
            <p class="animate-pulse">Discovering fresh videos...</p>
        </div>
    </div>

    <script>
        // ඔයාගේ Google Script Link එක මෙතනට දාන්න
        const MY_API_URL = "https://script.google.com/macros/s/AKfycbyP5gYRP4Ph-8y4xjnlEYyI7BQHuegYkL4p0XJRdrbI5WeUZ3GDJGBU0wpJl2IKS3aVSw/exec";
        
        // වැඩිපුර Tags දැම්මා අලුත් වීඩියෝ එන්න
        let TAGS = ["dasuni_seneethma" ,"kaveegamage", "dasuni_senethma_kukku", "srilanka_actress", "srilanka_niliyo_kukku", "shaudri_kukku", "srilanka_kukku", "praveena_disanayaka", "shanudri"];
        // Tags ටික Load වෙද්දිම අහඹු ලෙස කලවම් කිරීම (Refresh කරද්දි වෙනස් වෙන්න)
        TAGS = TAGS.sort(() => Math.random() - 0.5); 
        
        let currentTagIndex = 0;
        let isLoading = false;
        
        // Global Mute State (මුලින්ම Mute වෙලා තියෙන්නේ, එක පාරක් Click කරාම මේක False වෙනවා)
        let isGlobalMuted = true;
        
        const feedContainer = document.getElementById('video-feed');

        const observerOptions = {
            root: feedContainer,
            threshold: 0.6
        };

        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const videoElement = entry.target.querySelector('video');
                if (!videoElement) return;

                if (entry.isIntersecting) {
                    // වීඩියෝ එක තිරයට එනකොට, Global Mute එකට අනුව සද්දේ හදනවා
                    videoElement.muted = isGlobalMuted;
                    videoElement.play().catch(e => console.log("Autoplay paused. Waiting for user interaction."));
                } else {
                    videoElement.pause();
                    videoElement.currentTime = 0; 
                }
            });
        }, observerOptions);

        async function fetchVideos() {
            if (isLoading) return;
            isLoading = true;

            const tag = TAGS[currentTagIndex];
            currentTagIndex = (currentTagIndex + 1) % TAGS.length; 

            // API request එකට random අගයක් යවනවා cache එක මඟ හරින්න
            const cacheBuster = Math.floor(Math.random() * 10000);

            try {
                const response = await fetch(`${MY_API_URL}?tag=${tag}&cb=${cacheBuster}`);
                if (response.ok) {
                    const json = await response.json();
                    let rawVideos = [];

                    if (json.data && Array.isArray(json.data)) rawVideos = json.data;
                    else if (json.data && Array.isArray(json.data.videos)) rawVideos = json.data.videos;

                    let fetchedBatch = rawVideos.map(v => ({
                        id: v.id || v.video_id,
                        playUrl: v.play || v.wmplay, 
                        cover: v.cover || v.origin_cover,
                        title: v.title || "Trending TikTok Video",
                        author: v.author ? v.author.nickname : "TikToker"
                    })).filter(v => v.playUrl);

                    if (fetchedBatch.length > 0) {
                        // වීඩියෝ ටික තවත් කලවම් කරනවා
                        fetchedBatch.sort(() => Math.random() - 0.5);

                        const initialLoader = document.getElementById('initial-loader');
                        if (initialLoader) initialLoader.remove();

                        renderVideos(fetchedBatch);
                    }
                }
            } catch (e) {
                console.error("Failed to fetch videos:", e);
            }

            isLoading = false;
        }

        function renderVideos(videos) {
            videos.forEach(videoData => {
                const section = document.createElement('div');
                section.className = "snap-section";
                
                section.innerHTML = `
                    <img src="${videoData.cover}" class="absolute inset-0 w-full h-full object-cover blur-[60px] opacity-40 z-0 pointer-events-none" alt="blur-bg">
                    
                    <div class="relative z-10 w-full h-full md:w-[420px] md:h-[92%] md:rounded-[20px] bg-black overflow-hidden flex justify-center items-center shadow-2xl border-0 md:border md:border-gray-800/60">
                        
                        <video 
                            class="w-full h-full object-cover cursor-pointer"
                            loop 
                            playsinline 
                            muted 
                            preload="metadata"
                            poster="${videoData.cover}">
                            <source src="${videoData.playUrl}" type="video/mp4">
                        </video>

                        <div class="absolute bottom-6 left-4 right-4 text-left z-20 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] pointer-events-none">
                            <h3 class="text-white font-extrabold text-[18px] mb-1">@${videoData.author}</h3>
                            <p class="text-gray-100 text-[14px] font-medium leading-snug line-clamp-2">${videoData.title}</p>
                        </div>

                        <div class="unmute-hint absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black/70 text-white px-5 py-3 rounded-full pointer-events-none text-sm transition-opacity duration-300 backdrop-blur-md font-bold tracking-wide z-30">
                            Tap to Unmute
                        </div>
                    </div>
                `;

                const videoElement = section.querySelector('video');
                
                // වීඩියෝ එක Click කල විට Mute/Unmute කිරීම
                videoElement.addEventListener('click', () => {
                    // Global state එක වෙනස් කරනවා
                    isGlobalMuted = !isGlobalMuted;
                    
                    // දැනට ලෝඩ් වෙලා තියෙන *හැම* වීඩියෝ එකටම ඒක අදාළ කරනවා
                    document.querySelectorAll('video').forEach(vid => {
                        vid.muted = isGlobalMuted;
                    });

                    // සද්දෙ දැම්මට පස්සේ හැම වීඩියෝ එකේම "Tap to Unmute" වචනෙ අයින් කරලා දානවා
                    document.querySelectorAll('.unmute-hint').forEach(hint => {
                        hint.style.opacity = '0';
                    });
                });

                feedContainer.appendChild(section);
                videoObserver.observe(section);
            });
        }

        // Infinite Scroll
        feedContainer.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = feedContainer;
            if (scrollTop + clientHeight >= scrollHeight - (clientHeight * 2)) {
                fetchVideos();
            }
        });

        window.onload = () => {
            fetchVideos();
        };

    </script>
</body>
</html>

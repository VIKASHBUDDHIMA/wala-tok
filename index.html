<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOT TOK - Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100dvh; 
            width: 100vw;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .snap-container {
            height: 100dvh;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .snap-section {
            height: 100dvh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        .tiktok-loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ff0050; 
            border-bottom-color: #00f2fe; 
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="hidden md:block absolute top-6 left-8 z-50 pointer-events-none">
        <h1 class="text-3xl font-black italic tracking-wider drop-shadow-md">
            <span class="text-white">HOT</span><span class="text-[#ff0050]">TOK</span>
        </h1>
    </div>

    <div id="video-feed" class="snap-container">
        </div>

    <div id="initial-loader" class="h-[100dvh] w-full flex flex-col justify-center items-center bg-black z-50 absolute top-0 left-0">
        <div class="tiktok-loader mb-4"></div>
        <p class="text-gray-400 text-sm font-medium animate-pulse">Starting stream...</p>
    </div>

    <div id="bottom-loader" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-900/90 border border-gray-700 px-5 py-2 rounded-full z-50 flex items-center gap-3 transition-opacity duration-300 opacity-0 pointer-events-none shadow-lg">
        <div class="w-4 h-4 border-2 border-t-[#ff0050] border-r-[#00f2fe] border-b-transparent border-l-transparent rounded-full animate-spin"></div>
        <span class="text-xs font-semibold text-white tracking-wide">Loading next...</span>
    </div>

    <script>
        const MY_API_URL = "https://script.google.com/macros/s/AKfycbyP5gYRP4Ph-8y4xjnlEYyI7BQHuegYkL4p0XJRdrbI5WeUZ3GDJGBU0wpJl2IKS3aVSw/exec";
        
        const TAGS = ["nethmiroshel_kukku","piumi_edirisingha_hor","duneesha_piumi","srilanka_niliyo_hot","suhandi_wosadi_hot" ,"srilanka_hot_kello","srilankahotkukku",, "srilanka_kukku", "srilanka_niliyo", "praveena_disanayaka", "shaudri"];
        
        const tagCache = {};
        TAGS.forEach(t => tagCache[t] = []);

        let currentTagIndex = Math.floor(Math.random() * TAGS.length); 
        let seenVideoIds = new Set(); 
        let isFetching = false;
        let isGlobalMuted = true;
        
        const feedContainer = document.getElementById('video-feed');
        const initialLoader = document.getElementById('initial-loader');
        const bottomLoader = document.getElementById('bottom-loader');

        const observerOptions = { root: feedContainer, threshold: 0.6 };
        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const videoElement = entry.target.querySelector('video');
                if (!videoElement) return;

                if (entry.isIntersecting) {
                    videoElement.muted = isGlobalMuted;
                    videoElement.play().catch(e => console.log("Autoplay paused."));
                } else {
                    videoElement.pause();
                    videoElement.currentTime = 0; 
                }
            });
        }, observerOptions);

        function showBottomLoader() {
            if (initialLoader.style.display === 'none') {
                bottomLoader.classList.remove('opacity-0');
                bottomLoader.classList.add('opacity-100');
            }
        }

        function hideBottomLoader() {
            bottomLoader.classList.remove('opacity-100');
            bottomLoader.classList.add('opacity-0');
        }

        async function fetchAndRenderOneVideo() {
            if (isFetching) return false;

            let attempts = 0;
            while (attempts < TAGS.length) {
                const tag = TAGS[currentTagIndex];
                currentTagIndex = (currentTagIndex + 1) % TAGS.length; 

                if (!tagCache[tag]) {
                    tagCache[tag] = [];
                }

                if (tagCache[tag].length > 0) {
                    const videoData = tagCache[tag].shift();
                    renderVideoToDOM(videoData);
                    return true; 
                }

                isFetching = true;
                showBottomLoader(); 

                try {
                    const cacheBuster = Math.floor(Math.random() * 10000);
                    const response = await fetch(`${MY_API_URL}?tag=${tag}&cb=${cacheBuster}`);
                    
                    if (response.ok) {
                        const json = await response.json();
                        let rawVideos = [];

                        if (json.data && Array.isArray(json.data)) rawVideos = json.data;
                        else if (json.data && Array.isArray(json.data.videos)) rawVideos = json.data.videos;

                        let validVideos = rawVideos.filter(v => {
                            const id = v.id || v.video_id;
                            const play = v.play || v.wmplay;
                            return id && play && !seenVideoIds.has(id);
                        }).map(v => ({
                            id: v.id || v.video_id,
                            playUrl: v.play || v.wmplay,
                            cover: v.cover || v.origin_cover || "",
                            title: v.title || "Trending on HOT TOK",
                            author: v.author ? (v.author.nickname || "TikToker") : "TikToker"
                        }));

                        if (validVideos.length > 0) {
                            validVideos.forEach(v => seenVideoIds.add(v.id)); 
                            
                            const firstVideo = validVideos.shift();
                            renderVideoToDOM(firstVideo);
                            tagCache[tag] = validVideos;
                            
                            isFetching = false;
                            hideBottomLoader();
                            return true; 
                        }
                    }
                } catch (e) {
                    console.error("Fetch failed for tag:", tag, e);
                }
                
                isFetching = false;
                attempts++; 
            }
            
            hideBottomLoader();
            return false;
        }

        function renderVideoToDOM(videoData) {
            if (initialLoader && initialLoader.style.display !== 'none') {
                initialLoader.style.display = 'none';
            }

            const section = document.createElement('div');
            section.className = "snap-section video-item";
            
            const hintOpacity = isGlobalMuted ? 'opacity-100' : 'opacity-0 pointer-events-none';

            section.innerHTML = `
                <div class="relative w-full h-[100dvh] md:w-[420px] md:h-[94vh] md:rounded-[16px] bg-black overflow-hidden flex justify-center items-center md:border md:border-gray-800 shadow-2xl">
                    
                    <video 
                        class="w-full h-full object-cover cursor-pointer"
                        loop 
                        playsinline 
                        ${isGlobalMuted ? 'muted' : ''} 
                        preload="metadata"
                        poster="${videoData.cover}">
                        <source src="${videoData.playUrl}" type="video/mp4">
                    </video>

                    <div class="absolute bottom-5 left-4 right-4 text-left z-20 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] pointer-events-none">
                        <h3 class="text-white font-bold text-[17px] mb-1">@${videoData.author}</h3>
                        <p class="text-gray-200 text-[14px] font-normal leading-snug line-clamp-2">${videoData.title}</p>
                    </div>

                    <div class="unmute-hint absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black/60 text-white px-5 py-3 rounded-full pointer-events-none text-sm transition-opacity duration-300 backdrop-blur-sm font-semibold tracking-wide z-30 ${hintOpacity}">
                        Tap to Unmute
                    </div>
                </div>
            `;

            const videoElement = section.querySelector('video');
            
            videoElement.addEventListener('click', () => {
                isGlobalMuted = !isGlobalMuted;
                document.querySelectorAll('video').forEach(vid => vid.muted = isGlobalMuted);
                document.querySelectorAll('.unmute-hint').forEach(hint => {
                    hint.classList.remove('opacity-100');
                    hint.classList.add('opacity-0', 'pointer-events-none');
                });
            });

            // දැන් අලුත් වීඩියෝ එක අනිවාර්යයෙන්ම feed එකේ අන්තිමටම තමයි එකතු වෙන්නේ (වෙනස් වෙන්නේ නෑ)
            feedContainer.appendChild(section);
            videoObserver.observe(section); 
        }

        feedContainer.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = feedContainer;
            
            if (scrollTop + clientHeight >= scrollHeight - clientHeight * 1.5) {
                fetchAndRenderOneVideo();
            }
        });

        async function startStream() {
            await fetchAndRenderOneVideo(); 
            await fetchAndRenderOneVideo();
            await fetchAndRenderOneVideo();
        }

        window.onload = startStream;

    </script>
</body>
</html>

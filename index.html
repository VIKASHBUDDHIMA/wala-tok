<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOT TOK - Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100dvh; 
            width: 100vw;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .snap-container {
            height: 100dvh;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .snap-section {
            height: 100dvh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            flex-shrink: 0;
        }

        video::-webkit-media-controls { display: none !important; opacity: 0 !important; }
        video::-webkit-media-controls-start-playback-button { display: none !important; opacity: 0 !important; -webkit-appearance: none; }

        /* --- FIRE LOADER ANIMATION --- */
        .fire-wrapper {
            position: relative;
            width: 50px;
            height: 50px;
            transform: scale(0.5);
            transform-origin: center;
        }

        .fire {
            position: absolute;
            top: 0;
            left: 0;
            width: 50px;
            height: 50px;
            background-color: transparent;
        }

        @keyframes scaleUpDown {
            0%, 100% { transform: scaleY(1) scaleX(1); }
            50%, 90% { transform: scaleY(1.1); }
            75% { transform: scaleY(0.95); }
            80% { transform: scaleX(0.95); }
        }
        @keyframes shake {
            0%, 100% { transform: skewX(0) scale(1); }
            50% { transform: skewX(5deg) scale(0.9); }
        }
        @keyframes particleUp {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; top: -100%; transform: scale(0.5); }
        }
        @keyframes glow {
            0%, 100% { background-color: #ff0050; }
            50% { background-color: #ff0050; }
        }

        .fire-center { position: absolute; height: 100%; width: 100%; animation: scaleUpDown 3s ease-out infinite both; }
        .fire-center .main-fire { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(farthest-corner at 10px 0, #ff0050 0%, #ff0050 95%); transform: scaleX(0.8) rotate(45deg); border-radius: 0 40% 60% 40%; filter: drop-shadow(0 0 10px #ff0050); }
        .fire-center .particle-fire { position: absolute; top: 60%; left: 45%; width: 10px; height: 10px; background-color: #ff0050; border-radius: 50%; filter: drop-shadow(0 0 10px #ff0050); animation: particleUp 2s ease-out infinite both; }

        .fire-right { height: 100%; width: 100%; position: absolute; animation: shake 2s ease-out infinite both; }
        .fire-right .main-fire { position: absolute; top: 15%; right: -25%; width: 80%; height: 80%; background-color: #ff0050; transform: scaleX(0.8) rotate(45deg); border-radius: 0 40% 60% 40%; filter: drop-shadow(0 0 10px #ff0050); }
        .fire-right .particle-fire { position: absolute; top: 45%; left: 50%; width: 15px; height: 15px; background-color: #ff0050; transform: scaleX(0.8) rotate(45deg); border-radius: 50%; filter: drop-shadow(0 0 10px #ff0050); animation: particleUp 2s ease-out infinite both; }

        .fire-left { position: absolute; height: 100%; width: 100%; animation: shake 3s ease-out infinite both; }
        .fire-left .main-fire { position: absolute; top: 15%; left: -20%; width: 80%; height: 80%; background-color: #ff0050; transform: scaleX(0.8) rotate(45deg); border-radius: 0 40% 60% 40%; filter: drop-shadow(0 0 10px #ff0050); }
        .fire-left .particle-fire { position: absolute; top: 10%; left: 20%; width: 10%; height: 10%; background-color: #ff0050; border-radius: 50%; filter: drop-shadow(0 0 10px #ff0050); animation: particleUp 3s ease-out infinite both; }

        .fire-bottom .main-fire { position: absolute; top: 30%; left: 20%; width: 75%; height: 75%; background-color: #ff0050; transform: scaleX(0.8) rotate(45deg); border-radius: 0 40% 100% 40%; filter: blur(10px); animation: glow 2s ease-out infinite both; }

        .play-btn-overlay {
            transition: opacity 0.25s ease-in-out, transform 0.25s ease-in-out;
            pointer-events: none; 
        }
        
        .modern-btn {
            background: rgba(12, 12, 15, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modern-btn:hover {
            background: rgba(20, 20, 25, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .search-panel-glass {
            background: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.09);
        }

        @media (max-width: 768px) {
            .mobile-search-trigger { background: transparent !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important; border: none !important; box-shadow: none !important; padding: 0 !important; width: auto !important; height: auto !important; }
            .mute-btn { background: transparent !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important; border: none !important; box-shadow: none !important; width: auto !important; height: auto !important; top: 24px !important; right: 24px !important; }
        }
    </style>
</head>
<body>

    <div class="hidden md:block absolute top-8 left-10 z-50 pointer-events-none">
        <h1 class="text-3xl font-black italic tracking-wider drop-shadow-md">
            <span class="text-white">HOT</span><span class="text-[#ff0050]">TOK</span>
        </h1>
    </div>

    <div class="hidden md:flex absolute top-24 left-10 z-50 w-auto search-panel-glass px-5 py-4 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.8)] flex-col items-center min-w-[280px]">
        
        <div class="relative flex items-center w-full transition-all duration-300 group">
            <svg class="absolute left-3.5 w-[18px] h-[18px] text-gray-500 group-focus-within:text-[#ff0050] transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 011-14 0"></path>
            </svg>
            <input type="text" id="desktop-search-input" placeholder="Search hashtags..." class="w-full bg-[#f4f4f4] text-black pl-10 pr-12 py-3 rounded-full outline-none text-[14px] font-bold shadow-[0_4px_15px_rgba(0,0,0,0.2)] placeholder-gray-500 border-2 border-transparent focus:border-[#ff0050] transition-all" onkeydown="if(event.key === 'Enter') handleSearch('desktop')">
            <button onclick="handleSearch('desktop')" class="absolute right-1.5 bg-[#ff0050] hover:bg-[#ff2a6d] w-9 h-9 rounded-full flex items-center justify-center text-white transition-transform active:scale-90 shadow-md outline-none">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
        
        <div class="flex items-start justify-between w-full mt-3 gap-2">
            <div id="desktop-active-tags" class="flex flex-wrap gap-1.5 max-h-24 overflow-y-auto flex-1"></div>
            <button onclick="resetSearch()" id="desktop-reset-btn" class="hidden flex-shrink-0 bg-white/10 hover:bg-[#ff0050] p-1.5 rounded-full text-gray-300 hover:text-white transition-colors outline-none" title="Reset Filters">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
    </div>

    <div id="mobile-search-trigger-btn" class="block md:hidden fixed top-6 left-6 z-50 hidden">
        <button onclick="toggleMobileSearch(true)" class="modern-btn mobile-search-trigger outline-none active:scale-90 flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="6" stroke-linecap="round" stroke-linejoin="round"></circle>
                <line x1="16" y1="16" x2="22" y2="22" stroke-linecap="round" stroke-linejoin="round"></line>
            </svg>
        </button>
    </div>

    <div id="mobile-search-overlay" class="fixed inset-x-0 top-0 z-50 bg-black/95 backdrop-blur-2xl flex flex-col justify-start items-center p-6 border-b border-white/10 transition-all duration-300 transform -translate-y-full hidden shadow-[0_25px_5px_rgba(0,0,0,0.9)]">
        <div class="flex justify-between items-center w-full mb-5">
            <h2 class="text-md font-black text-white tracking-wide uppercase">Hashtag Filters</h2>
            <button onclick="toggleMobileSearch(false)" class="text-gray-400 hover:text-white bg-white/5 p-2 rounded-full outline-none">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <div class="relative flex items-center w-full max-w-[300px] transition-all duration-300 group">
            <svg class="absolute left-4 w-[18px] h-[18px] text-gray-500 group-focus-within:text-[#ff0050] transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 011-14 0"></path></svg>
            <input type="text" id="mobile-search-input" placeholder="Search hashtags..." class="w-full bg-[#f4f4f4] text-black pl-11 pr-14 py-3.5 rounded-full outline-none text-[15px] font-bold shadow-lg placeholder-gray-500 border-2 border-transparent focus:border-[#ff0050] transition-all" onkeydown="if(event.key === 'Enter') handleSearch('mobile')">
            <button onclick="handleSearch('mobile')" class="absolute right-1.5 bg-[#ff0050] hover:bg-[#ff2a6d] w-10 h-10 rounded-full flex items-center justify-center text-white transition-transform active:scale-90 outline-none">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
        
        <div class="flex items-start justify-between w-full max-w-[300px] mt-5 gap-2">
            <div id="mobile-active-tags" class="flex flex-wrap justify-center gap-1.5 flex-1"></div>
            <button onclick="resetSearch(); toggleMobileSearch(false);" id="mobile-reset-btn" class="hidden flex-shrink-0 bg-white/10 hover:bg-[#ff0050] p-2 rounded-full text-gray-300 hover:text-white transition-colors outline-none">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
    </div>

    <div class="hidden md:flex absolute right-12 top-1/2 transform -translate-y-1/2 flex-col gap-5 z-40">
        <button onclick="scrollFeed(-1)" class="modern-btn p-4 rounded-full group outline-none" title="Previous Video">
            <svg class="w-6 h-6 text-white group-hover:-translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"></path></svg>
        </button>
        <button onclick="scrollFeed(1)" class="modern-btn p-4 rounded-full group outline-none" title="Next Video">
            <svg class="w-6 h-6 text-white group-hover:translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>
        </button>
    </div>

    <video id="global-player" class="w-full h-full object-cover cursor-pointer absolute inset-0 z-10" loop playsinline webkit-playsinline preload="auto" style="display: none;"></video>

    <div id="video-feed" class="snap-container relative z-10">
        
        <div id="first-placeholder" class="snap-section p-0 md:p-4">
            <div class="relative w-full h-[100dvh] md:w-[420px] md:h-[94vh] md:rounded-[20px] bg-[#121214] overflow-hidden flex flex-col justify-center items-center md:border md:border-neutral-800 shadow-2xl">
                <div class="fire-wrapper mb-4">
                    <div class="fire">
                        <div class="fire-left"><div class="main-fire"></div><div class="particle-fire"></div></div>
                        <div class="fire-center"><div class="main-fire"></div><div class="particle-fire"></div></div>
                        <div class="fire-right"><div class="main-fire"></div><div class="particle-fire"></div></div>
                        <div class="fire-bottom"><div class="main-fire"></div></div>
                    </div>
                </div>
                <div class="absolute bottom-10 left-6 right-16 flex flex-col gap-2.5 w-2/3 pointer-events-none">
                    <div class="h-4 bg-white/10 rounded-full w-1/2 animate-pulse"></div>
                    <div class="h-3 bg-white/5 rounded-full w-full animate-pulse"></div>
                    <div class="h-3 bg-white/5 rounded-full w-5/6 animate-pulse"></div>
                </div>
            </div>
        </div>

        <div id="bottom-loader" class="hidden relative flex-shrink-0 w-full justify-center items-center z-10" style="height: 35dvh; scroll-snap-align: end;">
            <div class="w-full h-full md:w-[420px] bg-[#050505] flex flex-col justify-center items-center md:border-x md:border-b md:border-gray-800 md:rounded-b-[20px] border-t border-white/5">
                <div class="fire-wrapper">
                    <div class="fire">
                        <div class="fire-left"><div class="main-fire"></div><div class="particle-fire"></div></div>
                        <div class="fire-center"><div class="main-fire"></div><div class="particle-fire"></div></div>
                        <div class="fire-right"><div class="main-fire"></div><div class="particle-fire"></div></div>
                        <div class="fire-bottom"><div class="main-fire"></div></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const MY_API_URL = "https://script.google.com/macros/s/AKfycbwkQ155dnHs-NXzPobU6jSG046PuJPQUduqxSRyhXvAjC1mo5X-Ey1JYs9nzmYvf1A7rA/exec"; 
        
        let TAGS = []; 
        let originalSheetTags = []; 
        let customTags = []; 
        let currentTagIndex = 0;
        let loadedVideosData = []; 
        let currentActiveIndex = 0; 
        let isFetching = false;
        let isGlobalMuted = true; 
        let wasManuallyPaused = false; 
        let isWaitingForNextVideo = false; // මෙය Auto-scroll වළක්වා ගැනීමට භාවිතා කරයි
        
        let seenVideoIds = [];
        try {
            seenVideoIds = JSON.parse(localStorage.getItem('hotTokSeenVideos')) || [];
            seenVideoIds = seenVideoIds.map(id => id.toString());
        } catch(e) {
            seenVideoIds = [];
        }

        const feedContainer = document.getElementById('video-feed');
        const bottomLoader = document.getElementById('bottom-loader');
        const globalPlayer = document.getElementById('global-player');

        const iconMuted = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M17.25 9.75L19.5 12m0 0l2.25 2.25M19.5 12l2.25-2.25M19.5 12l-2.25 2.25m-10.5-6L4.5 9H1.5v6h3l4.5 3.75V5.25z" /></svg>`;
        const iconUnmuted = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z" /></svg>`;

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function markVideoAsSeen(id) {
            if (!id) return;
            const idStr = id.toString();
            if (!seenVideoIds.includes(idStr)) {
                seenVideoIds.push(idStr);
                if (seenVideoIds.length > 3000) { seenVideoIds.shift(); } 
                localStorage.setItem('hotTokSeenVideos', JSON.stringify(seenVideoIds));
            }
        }

        function scrollFeed(direction) {
            const height = feedContainer.clientHeight;
            feedContainer.scrollBy({ top: direction * height, behavior: 'smooth' });
        }

        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return; 
            if (e.key === 'ArrowUp') { e.preventDefault(); scrollFeed(-1); } 
            else if (e.key === 'ArrowDown') { e.preventDefault(); scrollFeed(1); } 
            else if (e.key.toLowerCase() === 'm') { toggleGlobalMute(); }
        });

        function toggleGlobalMute() {
            isGlobalMuted = !isGlobalMuted;
            globalPlayer.muted = isGlobalMuted;
            document.querySelectorAll('.mute-btn').forEach(btn => {
                btn.innerHTML = isGlobalMuted ? iconMuted : iconUnmuted;
            });
        }

        globalPlayer.addEventListener('click', () => {
            const currentCard = globalPlayer.closest('.video-wrapper'); 
            if (!currentCard) return;
            
            const playBtnOverlay = currentCard.querySelector('.play-btn-overlay');
            
            if (globalPlayer.paused) {
                wasManuallyPaused = false;
                globalPlayer.play().then(() => {
                    if (playBtnOverlay) {
                        playBtnOverlay.innerHTML = `<svg fill="#fff" viewBox="0 0 24 24" width="32" height="32" style="margin-left: 3px;"><path d="M8 5v14l11-7z"/></svg>`;
                        playBtnOverlay.style.opacity = '1';
                        playBtnOverlay.style.transform = 'translate(-50%, -50%) scale(1.1)';
                        setTimeout(() => {
                            if (!globalPlayer.paused) {
                                playBtnOverlay.style.opacity = '0';
                                playBtnOverlay.style.transform = 'translate(-50%, -50%) scale(1)';
                            }
                        }, 400);
                    }
                }).catch(e => console.log(e));
            } else {
                wasManuallyPaused = true;
                globalPlayer.pause();
                if (playBtnOverlay) {
                    playBtnOverlay.innerHTML = `<svg fill="#fff" viewBox="0 0 24 24" width="32" height="32"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
                    playBtnOverlay.style.opacity = '1';
                    playBtnOverlay.style.transform = 'translate(-50%, -50%) scale(1)';
                }
            }
        });

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                globalPlayer.pause();
            } else {
                if (!wasManuallyPaused) {
                    globalPlayer.play().catch(e => console.log(e));
                    const currentCard = globalPlayer.closest('.video-wrapper');
                    if (currentCard) {
                        const playBtnOverlay = currentCard.querySelector('.play-btn-overlay');
                        if (playBtnOverlay && !globalPlayer.paused) playBtnOverlay.style.opacity = '0';
                    }
                }
            }
        });

        function renderVideoCardStructure(container, videoData) {
            container.innerHTML = `
                <div class="relative w-full h-[100dvh] md:w-[420px] md:h-[94vh] md:rounded-[20px] bg-[#050505] overflow-hidden flex justify-center items-center md:border md:border-gray-800 shadow-[0_0_50px_rgba(0,0,0,0.6)]">
                    
                    <div class="video-slot absolute inset-0 z-10 bg-cover bg-center" style="background-image: url('${videoData.cover}');"></div>
                    
                    <button class="mute-btn absolute top-6 right-5 flex items-center justify-center z-40 outline-none text-white transition-transform active:scale-95 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
                        ${isGlobalMuted ? iconMuted : iconUnmuted}
                    </button>
                    
                    <div class="play-btn-overlay absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 opacity-0" style="width: 60px; height: 60px; background: rgba(0,0,0,0.55); border-radius: 50%; display: flex; justify-content: center; align-items: center; z-30; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.15);">
                    </div>
                    
                    <div class="absolute bottom-6 left-5 right-16 text-left z-20 drop-shadow-[0_2px_8px_rgba(0,0,0,1)] pointer-events-none">
                        <h3 class="text-white font-black text-[15.5px] mb-1 tracking-wide">@${videoData.author}</h3>
                        <p class="text-gray-200 text-[13px] font-normal leading-relaxed line-clamp-2">${videoData.title}</p>
                    </div>
                </div>
            `;

            const muteBtn = container.querySelector('.mute-btn');
            muteBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                toggleGlobalMute();
            });
        }

        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const container = entry.target;
                const index = parseInt(container.dataset.index);
                
                if (entry.isIntersecting) {
                    currentActiveIndex = index;
                    wasManuallyPaused = false; 
                    const videoData = loadedVideosData[currentActiveIndex];
                    
                    markVideoAsSeen(videoData.id);
                    
                    const slot = container.querySelector('.video-slot');
                    if (slot) {
                        if (globalPlayer.parentElement !== slot) {
                            slot.appendChild(globalPlayer);
                            globalPlayer.src = videoData.playUrl;
                            globalPlayer.load();
                        }
                        
                        globalPlayer.style.display = 'block';
                        globalPlayer.muted = isGlobalMuted; 
                        
                        const playBtnOverlay = container.querySelector('.play-btn-overlay');
                        if (playBtnOverlay) playBtnOverlay.style.opacity = '0';

                        setTimeout(() => {
                            if (currentActiveIndex === index) { 
                                globalPlayer.play().then(() => {
                                    if (playBtnOverlay) playBtnOverlay.style.opacity = '0';
                                }).catch(error => {
                                    if (playBtnOverlay) {
                                        playBtnOverlay.innerHTML = `<svg fill="#fff" viewBox="0 0 24 24" width="32" height="32" style="margin-left: 3px;"><path d="M8 5v14l11-7z"/></svg>`;
                                        playBtnOverlay.style.opacity = '1';
                                    }
                                });
                            }
                        }, 50);
                    }
                }
            });
        }, { threshold: 0.5 }); 

        // පරිශීලකයා ලෝඩරය වෙත හිතාමතා ස්ක්‍රෝල් කළොත් පමණක් 'isWaitingForNextVideo' සත්‍ය වේ.
        feedContainer.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = feedContainer;
            
            // පරිශීලකයා තිරයේ පහළටම (bottomLoader මතට) ස්ක්‍රෝල් කර ඇත්නම්...
            if (scrollTop + clientHeight >= scrollHeight - 5) {
                if (currentActiveIndex >= loadedVideosData.length - 1) {
                    isWaitingForNextVideo = true;
                }
            } else {
                isWaitingForNextVideo = false;
            }

            if (scrollTop + clientHeight >= scrollHeight - clientHeight * 1.5) {
                if(!isFetching) fetchNextVideo();
            }
        });

        // X බොත්තම එබූ විට හැෂ්ටැග් එකින් එක ඉවත් කිරීමේ ශ්‍රිතය
        function removeTag(tagToRemove) {
            customTags = customTags.filter(t => t !== tagToRemove);
            updateSearchUI();
            reloadFeedWithFilters();
        }

        function handleSearch(mode) {
            const inputId = mode === 'desktop' ? 'desktop-search-input' : 'mobile-search-input';
            const rawInput = document.getElementById(inputId).value.trim().toLowerCase();
            
            if (!rawInput) return;
            
            const parsedTags = rawInput.split(/[\s,]+/).map(t => t.trim().replace('#', '')).filter(t => t.length > 0);
            if (parsedTags.length === 0) return;
            
            // අලුතින් එකතු කරන ටැග් පවතින ලිස්ට් එකට එකතු කරයි (Duplicates මගහරියි)
            parsedTags.forEach(t => {
                if(!customTags.includes(t)) customTags.push(t);
            });
            document.getElementById(inputId).value = '';
            
            updateSearchUI();
            reloadFeedWithFilters();
            
            if (mode === 'mobile') {
                toggleMobileSearch(false);
            }
        }

        function resetSearch() {
            customTags = [];
            updateSearchUI();
            reloadFeedWithFilters();
        }

        function updateSearchUI() {
            const desktopActive = document.getElementById('desktop-active-tags');
            const mobileActive = document.getElementById('mobile-active-tags');
            const desktopReset = document.getElementById('desktop-reset-btn');
            const mobileReset = document.getElementById('mobile-reset-btn');
            
            let html = '';
            customTags.forEach(tag => {
                // 'X' Button සහිත හැෂ්ටැග් එක
                html += `
                <span class="inline-flex items-center gap-1.5 bg-black/50 text-[11px] pl-2.5 pr-1 py-1 rounded-full border border-white/20 text-[#00f2fe] font-bold shadow-sm">
                    #${tag}
                    <button onclick="removeTag('${tag}')" class="text-gray-300 hover:text-white bg-white/10 hover:bg-[#ff0050] rounded-full w-4 h-4 flex items-center justify-center outline-none transition-colors">
                        <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </span>`;
            });
            
            desktopActive.innerHTML = html;
            mobileActive.innerHTML = html;
            
            if (customTags.length > 0) {
                desktopReset.classList.remove('hidden');
                mobileReset.classList.remove('hidden');
            } else {
                desktopReset.classList.add('hidden');
                mobileReset.classList.add('hidden');
            }
        }

        function toggleMobileSearch(show) {
            const overlay = document.getElementById('mobile-search-overlay');
            if (show) {
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('-translate-y-full'), 10);
                document.getElementById('mobile-search-input').focus();
            } else {
                overlay.classList.add('-translate-y-full');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        async function reloadFeedWithFilters() {
            globalPlayer.pause();
            globalPlayer.style.display = 'none';
            isWaitingForNextVideo = false; // රීලෝඩ් කිරීමේදී Auto-scroll වළක්වයි
            
            const mobSearch = document.getElementById('mobile-search-trigger-btn');
            if (mobSearch) mobSearch.classList.add('hidden');
            
            document.querySelectorAll('.video-wrapper').forEach(w => {
                videoObserver.unobserve(w);
                w.remove();
            });
            
            let firstPlaceholder = document.getElementById('first-placeholder');
            if (!firstPlaceholder) {
                firstPlaceholder = document.createElement('div');
                firstPlaceholder.id = 'first-placeholder';
                firstPlaceholder.className = "snap-section p-0 md:p-4";
                firstPlaceholder.innerHTML = `
                    <div class="relative w-full h-[100dvh] md:w-[420px] md:h-[94vh] md:rounded-[20px] bg-[#121214] overflow-hidden flex flex-col justify-center items-center md:border md:border-neutral-800 shadow-2xl">
                        <div class="fire-wrapper mb-4">
                            <div class="fire">
                                <div class="fire-left"><div class="main-fire"></div><div class="particle-fire"></div></div>
                                <div class="fire-center"><div class="main-fire"></div><div class="particle-fire"></div></div>
                                <div class="fire-right"><div class="main-fire"></div><div class="particle-fire"></div></div>
                                <div class="fire-bottom"><div class="main-fire"></div></div>
                            </div>
                        </div>
                        <div class="absolute bottom-10 left-6 right-16 flex flex-col gap-2.5 w-2/3 pointer-events-none">
                            <div class="h-4 bg-white/10 rounded-full w-1/2 animate-pulse"></div>
                            <div class="h-3 bg-white/5 rounded-full w-full animate-pulse"></div>
                            <div class="h-3 bg-white/5 rounded-full w-5/6 animate-pulse"></div>
                        </div>
                    </div>
                `;
                feedContainer.insertBefore(firstPlaceholder, bottomLoader);
            }
            
            bottomLoader.classList.add('hidden');
            
            loadedVideosData = [];
            currentActiveIndex = 0;
            currentTagIndex = 0;
            
            if (customTags.length > 0) {
                TAGS = shuffleArray(customTags);
            } else {
                TAGS = shuffleArray(originalSheetTags);
            }
            
            feedContainer.scrollTop = 0;
            
            await fetchNextVideo();
            await fetchNextVideo();
        }

        async function fetchTagsFromSheet() {
            try {
                const response = await fetch(`${MY_API_URL}?action=get_tags`);
                const json = await response.json();
                if (json.tags && Array.isArray(json.tags) && json.tags.length > 0) {
                    originalSheetTags = json.tags;
                    TAGS = shuffleArray(originalSheetTags); 
                } else {
                    originalSheetTags = ["srilanka"];
                    TAGS = ["srilanka"]; 
                }
            } catch (e) {
                originalSheetTags = ["srilanka"];
                TAGS = ["srilanka"];
            }
            currentTagIndex = 0;
        }

        async function fetchNextVideo() {
            if (isFetching || TAGS.length === 0) return;
            isFetching = true;

            let attempts = 0;
            let found = false;

            while (attempts < 6 && !found) {
                const currentTag = TAGS[currentTagIndex];
                
                currentTagIndex = (currentTagIndex + 1) % TAGS.length;
                if (currentTagIndex === 0) TAGS = shuffleArray(TAGS); 
                
                try {
                    const response = await fetch(`${MY_API_URL}?action=get_videos&tag=${currentTag}`);
                    const json = await response.json();
                    let rawVideos = [];

                    if (json && json.data) {
                        if (Array.isArray(json.data)) rawVideos = json.data;
                        else if (Array.isArray(json.data.videos)) rawVideos = json.data.videos;
                    }

                    let validVideos = rawVideos.filter(v => {
                        const id = (v.id || v.video_id || "").toString();
                        const play = v.play || v.wmplay;
                        return id && play && !seenVideoIds.includes(id);
                    }).map(v => ({
                        id: (v.id || v.video_id).toString(),
                        playUrl: v.play || v.wmplay,
                        cover: v.cover || v.origin_cover || "",
                        title: v.title || "",
                        author: v.author ? (v.author.nickname || "User") : "User"
                    }));

                    if (validVideos.length > 0) {
                        const videoData = validVideos[0]; 
                        loadedVideosData.push(videoData);
                        
                        injectNewContainer(loadedVideosData.length - 1);
                        found = true;
                    }
                } catch (e) {
                    console.error("Fetch error");
                }
                attempts++;
            }
            
            isFetching = false;
        }

        function injectNewContainer(index) {
            const container = document.createElement('div');
            container.className = "snap-section video-wrapper p-0 md:p-4"; 
            container.dataset.index = index;
            
            renderVideoCardStructure(container, loadedVideosData[index]);
            
            const firstPlaceholder = document.getElementById('first-placeholder');
            if (firstPlaceholder) {
                firstPlaceholder.replaceWith(container);
                
                const mobSearch = document.getElementById('mobile-search-trigger-btn');
                if (mobSearch) mobSearch.classList.remove('hidden');
                
                bottomLoader.classList.remove('hidden');
                bottomLoader.style.display = 'flex';
                // පළමු වීඩියෝව auto-scroll නොවේ (scrollIntoView භාවිතා කර නැත).
            } else {
                feedContainer.insertBefore(container, bottomLoader);
                
                // පරිශීලකයා පහළටම ස්ක්‍රෝල් කරගෙන ගොස් ලෝඩරය දෙස බලා සිටී නම් පමණක්,
                // අලුත් වීඩියෝව යට ඉඳන් උඩට ස්ක්‍රෝල් වේ.
                if (isWaitingForNextVideo) {
                    isWaitingForNextVideo = false;
                    setTimeout(() => {
                        container.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                }
            }
            
            videoObserver.observe(container);
        }

        function unlockAutoplay() {
            globalPlayer.play().catch(e => console.log(e));
            document.removeEventListener('touchstart', unlockAutoplay);
            document.removeEventListener('click', unlockAutoplay);
        }
        document.addEventListener('touchstart', unlockAutoplay, { passive: true });
        document.addEventListener('click', unlockAutoplay, { passive: true });

        async function startStream() {
            try {
                await fetchTagsFromSheet(); 
                
                await fetchNextVideo(); 
                if (loadedVideosData.length === 0) {
                    seenVideoIds = [];
                    localStorage.removeItem('hotTokSeenVideos');
                    await fetchNextVideo();
                }
                
                await fetchNextVideo(); 
                await fetchNextVideo();
                
            } catch (error) {
                setTimeout(startStream, 2000);
            }
        }

        window.onload = startStream;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOT TOK - Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100dvh; 
            width: 100vw;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .snap-container {
            height: 100dvh;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .snap-section {
            height: 100dvh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        .bottom-loader-section {
            height: 100dvh;
            width: 100%;
            scroll-snap-align: start; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            flex-shrink: 0;
        }

        /* --- iOS Safari Native Controls Hide --- */
        video::-webkit-media-controls { display: none !important; opacity: 0 !important; }
        video::-webkit-media-controls-start-playback-button { display: none !important; opacity: 0 !important; -webkit-appearance: none; }

        /* --- Wave Loader --- */
        .wave-loader {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .wave-bar {
            width: 6px;
            height: 20px;
            border-radius: 4px;
            animation: wave-anim 1s ease-in-out infinite;
        }
        .wave-bar:nth-child(1) { background-color: #ff0050; animation-delay: 0s; }
        .wave-bar:nth-child(2) { background-color: #ffffff; animation-delay: 0.15s; }
        .wave-bar:nth-child(3) { background-color: #00f2fe; animation-delay: 0.3s; }

        @keyframes wave-anim {
            0%, 100% { transform: scaleY(0.6); }
            50% { transform: scaleY(1.6); }
        }

        /* --- Animations --- */
        .play-btn-overlay {
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
        }
        .pop-animation {
            transform: translate(-50%, -50%) scale(1.3) !important;
            opacity: 0 !important;
        }
        
        /* PC Mode Modern Button Effect */
        .modern-btn {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }
        .modern-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="hidden md:block absolute top-8 left-10 z-50 pointer-events-none">
        <h1 class="text-3xl font-black italic tracking-wider drop-shadow-md">
            <span class="text-white">HOT</span><span class="text-[#ff0050]">TOK</span>
        </h1>
    </div>

    <div class="hidden md:flex absolute left-10 top-1/2 transform -translate-y-1/2 flex-col gap-6 z-40 max-w-[220px]">
        <div class="bg-[#111111] bg-opacity-80 backdrop-blur-md p-5 rounded-2xl border border-gray-800 shadow-2xl">
            <h3 class="text-gray-400 text-[11px] font-bold uppercase tracking-widest mb-4">Quick Controls</h3>
            <div class="flex items-center gap-3 mb-3 text-sm text-gray-200">
                <div class="flex flex-col gap-1">
                    <span class="bg-gray-800 px-2.5 py-1.5 rounded-md text-xs font-mono shadow-sm flex items-center justify-center border border-gray-700">▲</span>
                    <span class="bg-gray-800 px-2.5 py-1.5 rounded-md text-xs font-mono shadow-sm flex items-center justify-center border border-gray-700">▼</span>
                </div>
                <span class="text-[13px]">Next / Prev Video</span>
            </div>
            <div class="flex items-center gap-3 text-sm text-gray-200">
                <span class="bg-gray-800 w-8 h-8 rounded-md text-xs font-mono shadow-sm flex items-center justify-center border border-gray-700">M</span>
                <span class="text-[13px]">Mute / Unmute</span>
            </div>
        </div>
    </div>

    <div class="hidden md:flex absolute right-12 top-1/2 transform -translate-y-1/2 flex-col gap-5 z-40">
        <button onclick="scrollFeed(-1)" class="modern-btn p-4 rounded-full group outline-none" title="Previous Video">
            <svg class="w-6 h-6 text-white group-hover:-translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"></path>
            </svg>
        </button>
        <button onclick="scrollFeed(1)" class="modern-btn p-4 rounded-full group outline-none" title="Next Video">
            <svg class="w-6 h-6 text-white group-hover:translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
            </svg>
        </button>
    </div>

    <div id="video-feed" class="snap-container relative z-10">
        
        <div id="first-placeholder" class="snap-section video-item">
            <div class="relative w-full h-[100dvh] md:w-[420px] md:h-[94vh] md:rounded-[20px] bg-[#121212] overflow-hidden flex justify-center items-center md:border md:border-gray-800 shadow-2xl">
                <div class="wave-loader">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
                
                <div class="absolute bottom-6 left-4 right-16 text-left z-20 opacity-30">
                    <div class="w-32 h-4 bg-gray-600 rounded mb-3"></div>
                    <div class="w-48 h-3 bg-gray-600 rounded"></div>
                </div>
            </div>
        </div>

        <div id="bottom-loader" class="bottom-loader-section hidden">
            <div class="relative w-full h-[100dvh] md:w-[420px] md:h-[94vh] md:rounded-[20px] bg-[#121212] overflow-hidden flex justify-center items-center md:border md:border-gray-800 shadow-2xl">
                <div class="wave-loader">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const MY_API_URL = "https://script.google.com/macros/s/AKfycbwkQ155dnHs-NXzPobU6jSG046PuJPQUduqxSRyhXvAjC1mo5X-Ey1JYs9nzmYvf1A7rA/exec"; 
        
        let TAGS = []; 
        let currentTagIndex = 0;
        let videoPool = []; 
        
        let seenVideoIds = [];
        try {
            seenVideoIds = JSON.parse(localStorage.getItem('hotTokSeenVideos')) || [];
        } catch(e) {
            seenVideoIds = [];
        }

        let isFetching = false;
        let isRendering = false;
        let isGlobalMuted = true; // මුලින්ම වෙබ් එකට එද්දි Muted 
        let currentVisibleVideo = null; 
        
        const feedContainer = document.getElementById('video-feed');
        const bottomLoader = document.getElementById('bottom-loader');

        const iconMuted = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd" /><path stroke-linecap="round" stroke-linejoin="round" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" /></svg>`;
        const iconUnmuted = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>`;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function markVideoAsSeen(id) {
            if (!seenVideoIds.includes(id)) {
                seenVideoIds.push(id);
                if (seenVideoIds.length > 800) {
                    seenVideoIds.shift(); 
                }
                localStorage.setItem('hotTokSeenVideos', JSON.stringify(seenVideoIds));
            }
        }

        function scrollFeed(direction) {
            const height = feedContainer.clientHeight;
            feedContainer.scrollBy({ top: direction * height, behavior: 'smooth' });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                scrollFeed(-1);
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                scrollFeed(1);
            } else if (e.key.toLowerCase() === 'm') {
                toggleGlobalMute();
            }
        });

        function toggleGlobalMute() {
            isGlobalMuted = !isGlobalMuted;
            document.querySelectorAll('video').forEach(vid => vid.muted = isGlobalMuted);
            document.querySelectorAll('.mute-btn').forEach(btn => {
                btn.innerHTML = isGlobalMuted ? iconMuted : iconUnmuted;
            });
        }

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                if (currentVisibleVideo && !currentVisibleVideo.paused) {
                    currentVisibleVideo.pause();
                    currentVisibleVideo.dataset.wasPlaying = "true";
                }
            } else {
                if (currentVisibleVideo && currentVisibleVideo.dataset.wasPlaying === "true") {
                    currentVisibleVideo.play().catch(e => console.log(e));
                    currentVisibleVideo.dataset.wasPlaying = "false";
                }
            }
        });

        const observerOptions = { root: feedContainer, threshold: 0.5 };
        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const videoElement = entry.target.querySelector('video');
                const playBtnOverlay = entry.target.querySelector('.play-btn-overlay');
                if (!videoElement) return;

                if (entry.isIntersecting) {
                    currentVisibleVideo = videoElement;
                    
                    // වීඩියෝ එකට Global Mute State එක අනිවාර්යයෙන්ම ලබා දෙනවා (බලෙන් Mute කරන්නේ නෑ)
                    videoElement.muted = isGlobalMuted; 
                    
                    const playPromise = videoElement.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            // Play වුනා නම් අයිකන් එක හංගනවා
                            if(playBtnOverlay) {
                                playBtnOverlay.style.opacity = '0';
                                playBtnOverlay.style.transform = 'translate(-50%, -50%) scale(1)';
                            }
                        }).catch(error => {
                            // බ්‍රවුසර් එකෙන් ප්ලේ වෙන එක Block කරොත් විතරක් Play අයිකන් එක පෙන්වනවා.
                            // මෙතනදී Auto-Mute කරන්නේ නෑ! ඔයාගේ Unmute State එක එහෙම්මම තියෙනවා.
                            console.log("Autoplay waiting for interaction");
                            if(playBtnOverlay) playBtnOverlay.style.opacity = '1';
                        });
                    }
                } else {
                    videoElement.pause();
                    videoElement.currentTime = 0; 
                    // වීඩියෝ එකෙන් අයින් වෙද්දි Pause අයිකන් එක අයින් කරනවා
                    if(playBtnOverlay) playBtnOverlay.style.opacity = '0';
                }
            });
        }, observerOptions);

        async function fetchTagsFromSheet() {
            try {
                const response = await fetch(`${MY_API_URL}?action=get_tags`);
                const json = await response.json();
                if (json.tags && Array.isArray(json.tags) && json.tags.length > 0) {
                    TAGS = shuffleArray(json.tags); 
                } else {
                    TAGS = ["srilanka"]; 
                }
            } catch (e) {
                TAGS = ["srilanka"];
            }
            currentTagIndex = 0;
        }

        async function fetchVideosToPool() {
            if (isFetching || TAGS.length === 0) return false;
            isFetching = true;

            let attempts = 0;
            let found = false;

            while (attempts < 5 && !found) {
                const currentTag = TAGS[currentTagIndex];
                currentTagIndex = (currentTagIndex + 1) % TAGS.length;
                if (currentTagIndex === 0) {
                    shuffleArray(TAGS); 
                }
                
                try {
                    const response = await fetch(`${MY_API_URL}?action=get_videos&tag=${currentTag}`);
                    if (!response.ok) throw new Error("Network issue");
                    
                    const json = await response.json();
                    let rawVideos = [];

                    if (json && json.data) {
                        if (Array.isArray(json.data)) rawVideos = json.data;
                        else if (Array.isArray(json.data.videos)) rawVideos = json.data.videos;
                    }

                    let validVideos = rawVideos.filter(v => {
                        const id = v.id || v.video_id;
                        const play = v.play || v.wmplay;
                        return id && play && !seenVideoIds.includes(id);
                    }).map(v => ({
                        id: v.id || v.video_id,
                        playUrl: v.play || v.wmplay,
                        cover: v.cover || v.origin_cover || "",
                        title: v.title || "",
                        author: v.author ? (v.author.nickname || "User") : "User"
                    }));

                    if (validVideos.length > 0) {
                        videoPool.push(validVideos[0]); 
                        found = true;
                        requestNextRender();
                    }
                } catch (e) {
                    console.error("Fetch error, switching tag...");
                }
                attempts++;
            }
            
            isFetching = false;
            return found;
        }

        async function fillPoolInBackground() {
            if (videoPool.length < 5 && !isFetching) {
                await fetchVideosToPool();
                fillPoolInBackground();
            }
        }

        function createVideoSection(videoData) {
            const section = document.createElement('div');
            section.className = "snap-section video-item p-0 md:p-4"; 
            
            section.innerHTML = `
                <div class="relative w-full h-[100dvh] md:w-[420px] md:h-[94vh] md:rounded-[20px] bg-black overflow-hidden flex justify-center items-center md:border md:border-gray-800 shadow-[0_0_40px_rgba(0,0,0,0.5)]">
                    
                    <button class="mute-btn absolute top-6 right-5 p-2.5 z-40 outline-none bg-transparent border-none text-white drop-shadow-[0_2px_5px_rgba(0,0,0,0.9)] transition-transform active:scale-95">
                        ${isGlobalMuted ? iconMuted : iconUnmuted}
                    </button>

                    <video 
                        class="w-full h-full object-cover cursor-pointer"
                        loop 
                        playsinline 
                        webkit-playsinline
                        preload="metadata"
                        src="${videoData.playUrl}"
                        poster="${videoData.cover}">
                    </video>

                    <div class="play-btn-overlay absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none opacity-0" style="width: 70px; height: 70px; background: rgba(0,0,0,0.4); border-radius: 50%; display: flex; justify-content: center; align-items: center; z-30; backdrop-filter: blur(4px);">
                        <svg fill="#fff" viewBox="0 0 24 24" width="40" height="40" style="margin-left: 4px;"><path d="M8 5v14l11-7z"/></svg>
                    </div>

                    <div class="absolute bottom-6 left-5 right-16 text-left z-20 drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] pointer-events-none">
                        <h3 class="text-white font-bold text-[17px] mb-1.5 tracking-wide">@${videoData.author}</h3>
                        <p class="text-gray-200 text-[14px] font-normal leading-snug line-clamp-2">${videoData.title}</p>
                    </div>
                </div>
            `;

            const videoElement = section.querySelector('video');
            const playBtnOverlay = section.querySelector('.play-btn-overlay');
            const muteBtn = section.querySelector('.mute-btn');
            
            videoElement.muted = isGlobalMuted; 

            // වීඩියෝ එක Click කරාම Push (Pause) වෙන ලොජික් එක
            videoElement.addEventListener('click', () => {
                if (videoElement.paused) {
                    const playPromise = videoElement.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            playBtnOverlay.style.opacity = '0'; // Play වෙනකොට අයිකන් එක හංගනවා
                        }).catch(e => console.log(e));
                    }
                } else {
                    videoElement.pause();
                    playBtnOverlay.style.opacity = '1'; // Pause කරාම අයිකන් එක පෙන්වනවා
                    playBtnOverlay.style.transform = 'translate(-50%, -50%) scale(1)';
                }
            });

            muteBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                toggleGlobalMute();
            });

            return section;
        }

        async function requestNextRender() {
            if (videoPool.length > 0 && !isRendering) {
                isRendering = true;
                const videoData = videoPool.shift(); 
                markVideoAsSeen(videoData.id);
                
                const section = createVideoSection(videoData);
                
                const placeholder = document.getElementById('first-placeholder');
                if (placeholder) {
                    placeholder.replaceWith(section);
                    bottomLoader.style.display = 'flex'; 
                    bottomLoader.classList.remove('hidden');
                } else {
                    const loaderRect = bottomLoader.getBoundingClientRect();
                    const loaderInView = (loaderRect.top >= 0 && loaderRect.top < window.innerHeight);
                    
                    feedContainer.insertBefore(section, bottomLoader);
                    
                    if (loaderInView) {
                        section.scrollIntoView({ behavior: 'smooth' });
                    }
                }
                
                videoObserver.observe(section); 
                isRendering = false;
            }
            fillPoolInBackground();
        }

        feedContainer.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = feedContainer;
            if (scrollTop + clientHeight >= scrollHeight - clientHeight * 1.5) {
                fillPoolInBackground();
            }
        });

        function unlockAutoplay() {
            if (currentVisibleVideo) {
                currentVisibleVideo.play().catch(e => console.log(e));
            }
            document.removeEventListener('touchstart', unlockAutoplay);
            document.removeEventListener('click', unlockAutoplay);
        }
        document.addEventListener('touchstart', unlockAutoplay, { passive: true });
        document.addEventListener('click', unlockAutoplay, { passive: true });

        async function startStream() {
            try {
                await fetchTagsFromSheet(); 
                
                let success = await fetchVideosToPool(); 
                if (!success) {
                    seenVideoIds = [];
                    localStorage.removeItem('hotTokSeenVideos');
                    await fetchVideosToPool();
                }
                
                await requestNextRender();
                setTimeout(requestNextRender, 500);
                
            } catch (error) {
                console.error("Stream init error");
                setTimeout(startStream, 2000);
            }
        }

        window.onload = startStream;

    </script>
</body>
</html>

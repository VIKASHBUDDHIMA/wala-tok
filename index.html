<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Style Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000000; /* Dark background like TikTok */
            color: #ffffff;
            overflow: hidden; /* We handle scrolling inside the feed container */
        }
        
        /* Hide scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* Snap Scrolling Magic */
        .snap-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .snap-section {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Loader Animation */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ec4899;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="video-feed" class="snap-container">
        <div id="initial-loader" class="h-screen flex flex-col justify-center items-center text-gray-400">
            <div class="loader mb-4"></div>
            <p class="animate-pulse">Connecting to TikTok servers...</p>
        </div>
    </div>

    <script>
        // ඔයාගේ Google Script Link එක
        const MY_API_URL = "https://script.google.com/macros/s/AKfycbyP5gYRP4Ph-8y4xjnlEYyI7BQHuegYkL4p0XJRdrbI5WeUZ3GDJGBU0wpJl2IKS3aVSw/exec";
        
        const TAGS = ["nethmiroshel_kukku","piumi_edirisingha_hor","duneesha_piumi","srilanka_niliyo_hot","suhandi_wosadi_hot" ,"srilanka_hot_kello","srilankahotkukku",, "srilanka_kukku", "srilanka_niliyo", "praveena_disanayaka", "shaudri"];
        let currentTagIndex = 0;
        let isLoading = false;
        
        const feedContainer = document.getElementById('video-feed');

        // ලැග් වීම වළක්වන සුපිරි තාක්ෂණය (Intersection Observer)
        // මේකෙන් කරන්නේ තිරයේ පේන්න තියෙන වීඩියෝ එක විතරක් Play කරලා අනිත්වා Pause කරන එකයි
        const observerOptions = {
            root: feedContainer,
            threshold: 0.6 // වීඩියෝ එකෙන් 60%ක් තිරයට ආවම Play වෙනවා
        };

        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const videoElement = entry.target.querySelector('video');
                if (!videoElement) return;

                if (entry.isIntersecting) {
                    // වීඩියෝ එක තිරයට ආවම Play කරනවා
                    videoElement.play().catch(e => console.log("Autoplay paused by browser."));
                } else {
                    // වීඩියෝ එක තිරයෙන් ගියාම Pause කරනවා (RAM එක ඉතුරු වෙන්න)
                    videoElement.pause();
                    videoElement.currentTime = 0; 
                }
            });
        }, observerOptions);

        async function fetchVideos() {
            if (isLoading) return;
            isLoading = true;

            const tag = TAGS[currentTagIndex];
            currentTagIndex = (currentTagIndex + 1) % TAGS.length; // Rotate tags

            try {
                const response = await fetch(`${MY_API_URL}?tag=${tag}`);
                if (response.ok) {
                    const json = await response.json();
                    let rawVideos = [];

                    if (json.data && Array.isArray(json.data)) rawVideos = json.data;
                    else if (json.data && Array.isArray(json.data.videos)) rawVideos = json.data.videos;

                    let fetchedBatch = rawVideos.map(v => ({
                        id: v.id || v.video_id,
                        playUrl: v.play || v.wmplay, 
                        cover: v.cover || v.origin_cover,
                        title: v.title || "Trending TikTok Video",
                        author: v.author ? v.author.nickname : "TikToker"
                    })).filter(v => v.playUrl);

                    if (fetchedBatch.length > 0) {
                        // පළමු පාර Load වෙද්දි Loading Screen එක අයින් කරනවා
                        const initialLoader = document.getElementById('initial-loader');
                        if (initialLoader) initialLoader.remove();

                        renderVideos(fetchedBatch);
                    }
                }
            } catch (e) {
                console.error("Failed to fetch videos:", e);
            }

            isLoading = false;
        }

        function renderVideos(videos) {
            videos.forEach(videoData => {
                const section = document.createElement('div');
                section.className = "snap-section";
                
                // PC එකේදී ලස්සනට මැදින් පේන්නත්, Phone එකේ Full Screen පේන්නත් හදපු Layout එක
                section.innerHTML = `
                    <div class="relative w-full h-full md:w-[400px] md:h-[90%] md:rounded-2xl md:border-2 md:border-gray-800 bg-black overflow-hidden flex justify-center items-center shadow-2xl">
                        
                        <video 
                            class="w-full h-full object-cover cursor-pointer"
                            loop 
                            playsinline 
                            muted 
                            preload="metadata"
                            poster="${videoData.cover}">
                            <source src="${videoData.playUrl}" type="video/mp4">
                        </video>

                        <div class="absolute bottom-4 left-4 right-16 text-left z-10 drop-shadow-lg">
                            <h3 class="text-white font-bold text-[17px] mb-1 hover:underline">@${videoData.author}</h3>
                            <p class="text-white text-[14px] font-light leading-snug line-clamp-2">${videoData.title}</p>
                        </div>

                        <div class="absolute bottom-8 right-2 flex flex-col items-center space-y-4 z-10 drop-shadow-lg">
                            <div class="bg-gray-800/50 p-3 rounded-full backdrop-blur-sm cursor-pointer hover:bg-pink-500 transition">
                                <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                            </div>
                            <div class="bg-gray-800/50 p-3 rounded-full backdrop-blur-sm cursor-pointer">
                                <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>
                            </div>
                        </div>

                        <div class="unmute-hint absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black/60 text-white px-4 py-2 rounded-full pointer-events-none opacity-80 text-sm transition-opacity duration-300">
                            Tap to Unmute
                        </div>
                    </div>
                `;

                const videoElement = section.querySelector('video');
                const unmuteHint = section.querySelector('.unmute-hint');

                // වීඩියෝ එක Click කරාම Mute/Unmute කිරීම සහ Play/Pause කිරීම
                videoElement.addEventListener('click', () => {
                    videoElement.muted = !videoElement.muted;
                    if (unmuteHint) unmuteHint.style.opacity = '0'; // Hint එක අයින් කරනවා
                });

                feedContainer.appendChild(section);
                
                // වීඩියෝ එක Observer එකට දානවා (Lag වෙන එක නවත්තන්න)
                videoObserver.observe(section);
            });
        }

        // Infinite Scroll - පල්ලෙහාට යද්දී අලුත් වීඩියෝ ලෝඩ් කිරීම
        feedContainer.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = feedContainer;
            // අන්තිම වීඩියෝ 2ක් විතර තියෙද්දි ඊළඟ ටික ඉල්ලනවා (Smooth loading)
            if (scrollTop + clientHeight >= scrollHeight - (clientHeight * 2)) {
                fetchVideos();
            }
        });

        // මුලින්ම ලෝඩ් වෙද්දි වීඩියෝ ටික අරන් එනවා
        window.onload = () => {
            fetchVideos();
        };

    </script>
</body>
</html>

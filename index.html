<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Premium Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080c14; color: #ffffff; }
    </style>
</head>
<body class="p-4 font-sans selection:bg-pink-500 selection:text-white">

    <header class="text-center my-6">
        <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 animate-pulse">
            Fresh Video Stream
        </h1>
        <p class="text-xs text-gray-500 mt-1 uppercase tracking-widest">100% Realtime • Live Automated</p>
    </header>

    <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 max-w-7xl mx-auto">
        <div id="loading" class="col-span-full text-center text-gray-500 py-20 text-sm font-medium animate-bounce">
            Connecting to secure stream and fetching the latest content...
        </div>
    </div>

    <script>
        // ඔබට අවශ්‍ය වීඩියෝ මාතෘකා (Tags)
        const TAGS = ["srilanka", "trending", "dance"];

        // වඩාත්ම ස්ථාවර පොදු සර්වර් ලැයිස්තුව
        const INSTANCES = [
            "https://proxitok.pussthecat.org",
            "https://tok.adminforge.de",
            "https://proxitok.privacydev.net",
            "https://tt.opnxng.com"
        ];

        async function fetchVideosFromBrowser() {
            let allVideoIds = [];

            for (let tag of TAGS) {
                for (let instance of INSTANCES) {
                    const targetUrl = `${instance}/tag/${tag}/rss`;
                    
                    // බ්ලොක් නොවී වැඩ කරන ප්‍රධාන Proxy ක්‍රම 2ක් (එකක් Fail වුනොත් අනෙක ක්‍රියාත්මක වේ)
                    const proxies = [
                        `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
                        `https://cors-anywhere.azm.workers.dev/${targetUrl}`
                    ];

                    let fetched = false;

                    for (let proxyUrl of proxies) {
                        try {
                            const response = await fetch(proxyUrl);
                            if (response.ok) {
                                const text = await response.text();
                                
                                // RSS එකෙන් වීඩියෝ ID වෙන් කර ගැනීම
                                const regex = /\/video\/(\d+)/g;
                                let match;
                                let foundCount = 0;

                                while ((match = regex.exec(text)) !== null) {
                                    allVideoIds.push(match[1]);
                                    foundCount++;
                                }

                                if (foundCount > 0) {
                                    console.log(`Successfully loaded ${foundCount} videos for #${tag} using proxy.`);
                                    fetched = true;
                                    break; // සාර්ථක නම් ඊළඟ Proxy එකට යන්නේ නැත
                                }
                            }
                        } catch (e) {
                            console.log("Proxy connection failed, trying fallback...");
                        }
                    }

                    if (fetched) break; // මේ සර්වර් එකෙන් වැඩේ හරි නම් ඊළඟ සර්වර් එකට යන්නේ නැත
                }
            }

            // ඩූප්‍ලිකේට් අයින් කිරීම
            return [...new Set(allVideoIds)];
        }

        async function loadGallery() {
            const gallery = document.getElementById('gallery');
            const loading = document.getElementById('loading');

            let videoIds = await fetchVideosFromBrowser();

            if (!videoIds || videoIds.length === 0) {
                loading.innerText = "Temporary connection issue. Please refresh the page in a few seconds.";
                return;
            }

            // හැමවිටම වීඩියෝ මාරු කිරීම (Shuffle)
            videoIds.sort(() => Math.random() - 0.5);
            loading.remove();

            // උපරිම වීඩියෝ 40ක් පෙන්වීම
            videoIds.slice(0, 40).forEach(id => {
                const card = document.createElement('div');
                card.className = "bg-gray-900 rounded-2xl overflow-hidden shadow-2xl border border-gray-800/60 p-2 flex justify-center items-center hover:border-pink-500/40 transition duration-300";
                
                card.innerHTML = `
                    <iframe 
                        src="https://www.tiktok.com/embed/v2/${id}" 
                        class="w-full h-[560px] rounded-xl border-0"
                        allowfullscreen 
                        scrolling="no"
                        allow="encrypted-media;">
                    </iframe>
                `;
                gallery.appendChild(card);
            });
        }

        window.onload = loadGallery;
    </script>
</body>
</html>

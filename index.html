<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Video Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080c14; color: #ffffff; }
        /* HTML5 Custom video container wrapper */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 177.77%; /* 16:9 vertical format */
            background: #0d1321;
            border-radius: 16px;
            overflow: hidden;
        }
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="p-4 font-sans selection:bg-pink-500 selection:text-white">

    <header class="text-center my-6">
        <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 animate-pulse">
            Fresh Video Stream
        </h1>
        <p class="text-xs text-gray-500 mt-1 uppercase tracking-widest">100% Native HTML5 Player • Infinite Scroll</p>
    </header>

    <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 max-w-7xl mx-auto">
        </div>

    <div id="scroll-trigger" class="text-center py-10 text-gray-500 text-sm font-medium">
        <span id="loading-text" class="animate-pulse">Loading more fresh content...</span>
    </div>

    <script>
        // [අනිවාර්යයි] ඔයාගේ අලුත්ම Google Script ලින්ක් එක මෙතනට දාන්න
        const MY_API_URL = "https://script.google.com/macros/s/AKfycbyP5gYRP4Ph-8y4xjnlEYyI7BQHuegYkL4p0XJRdrbI5WeUZ3GDJGBU0wpJl2IKS3aVSw/exec"; 
        
        // වීඩියෝ එකතු කරගන්නා Pool එක සහ දැනට පාවිච්චි කරන Tags
        let videoPool = [];
        const TAGS = ["srilanka", "trending", "dance", "foryou"];
        let currentTagIndex = 0;
        let isLoading = false;

        // API එකෙන් ඩේටා රැගෙන Pool එකට දැමීම
        async function fetchMoreVideos() {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('loading-text').innerText = "Fetching raw video streams...";

            const tag = TAGS[currentTagIndex];
            currentTagIndex = (currentTagIndex + 1) % TAGS.length; // ඊළඟ පාරට වෙන ටැග් එකක් සෙට් කිරීම

            try {
                const response = await fetch(`${MY_API_URL}?tag=${tag}`);
                if (response.ok) {
                    const json = await response.json();
                    let rawVideos = [];

                    if (json.data) {
                        if (Array.isArray(json.data)) rawVideos = json.data;
                        else if (Array.isArray(json.data.videos)) rawVideos = json.data.videos;
                    }

                    // අපිට අවශ්‍ය කරන Direct MP4 Link එක සහ Cover Image එක වෙන් කර ගැනීම
                    let fetchedBatch = rawVideos.map(v => ({
                        id: v.id || v.video_id,
                        playUrl: v.play || v.wmplay, // Direct Video URL
                        cover: v.cover || v.origin_cover, // Thumbnail Image
                        title: v.title || "Trending TikTok Video"
                    })).filter(v => v.playUrl); // ලින්ක් එකක් නැති ඒවා අයින් කරයි

                    if (fetchedBatch.length > 0) {
                        // වීඩියෝ ටික කලවම් කරලා Pool එකට එකතු කිරීම
                        fetchedBatch.sort(() => Math.random() - 0.5);
                        videoPool.push(...fetchedBatch);
                        console.log(`Successfully added ${fetchedBatch.length} native videos to queue from #${tag}`);
                    }
                }
            } catch (e) {
                console.error("API error fetching batch:", e);
            }

            isLoading = false;
            renderNextBatch();
        }

        // වෙබ් පිටුවට වීඩියෝ Render කිරීම (එක් වරකට 8 බැගින්)
        function renderNextBatch() {
            const gallery = document.getElementById('gallery');
            
            if (videoPool.length === 0) {
                if (!isLoading) fetchMoreVideos();
                return;
            }

            const batchToRender = videoPool.splice(0, 8); // Pool එකෙන් වීඩියෝ 8ක් කපා ගැනීම

            batchToRender.forEach(video => {
                const card = document.createElement('div');
                card.className = "bg-gray-900 rounded-2xl p-2 shadow-2xl border border-gray-800/60 hover:border-purple-500/40 transition duration-300 flex flex-col justify-between";
                
                // HTML5 Native Video Tag එක නිර්මාණය
                card.innerHTML = `
                    <div class="video-wrapper">
                        <video 
                            controls 
                            loop 
                            playsinline 
                            preload="none" 
                            poster="${video.cover}"
                            class="rounded-xl">
                            <source src="${video.playUrl}" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    </div>
                    <p class="text-xs text-gray-400 mt-2 px-1 line-clamp-1 font-light">${video.title}</p>
                `;
                gallery.appendChild(card);
            });

            document.getElementById('loading-text').innerText = "Scroll down for more videos";
        }

        // Infinite Scroll - පරිශීලකයා පල්ලෙහාට යද්දී ස්වයංක්‍රීයව හඳුනාගැනීම
        window.onscroll = function() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 900) {
                // Pool එක හිස් වේගෙන එනකොට අලුත් ඒවා ඉල්ලනවා, නැත්නම් තියෙන ඒවා පෙන්වනවා
                if (videoPool.length < 5 && !isLoading) {
                    fetchMoreVideos();
                } else {
                    renderNextBatch();
                }
            }
        };

        // මුලින්ම පිටුව Load වන විට ක්‍රියාත්මක වීම
        window.onload = async () => {
            await fetchMoreVideos(); // පළමු වීඩියෝ තොගය ගැනීම
            // සයිට් එක පිරෙන්න මදි වගේ නම් තව පාරක් රෙන්ඩර් කරනවා
            if(document.body.offsetHeight <= window.innerHeight) {
                renderNextBatch();
            }
        };
    </script>
</body>
</html>
